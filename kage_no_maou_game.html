<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>影の魔王と、光を選ぶ朝</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+JP:wght@300;400&display=swap');

:root {
  --gold: #C9A84C;
  --gold-l: #E8C97A;
  --pur-deep: #1A0A2E;
  --pur-mid: #2D1457;
  --pur-glow: #7B3FA0;
  --teal: #2DC4B2;
  --white: #F0EBF8;
  --shadow: 0 1px 8px rgba(0,0,0,0.9);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--pur-deep);
  font-family: 'Noto Serif JP', serif;
  color: var(--white);
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  user-select: none;
}

html {
  height: 100%;
}

/* ══ SCREENS ══ */
.screen { display:none; position:fixed; inset:0; z-index:50; width:100%; height:100%; }
.screen.active { display:flex; }

/* ── TITLE SCREEN ── */
#title-screen {
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 0;
  position: relative;
  overflow: hidden;
  background: #0a0014;
}

#title-bg-img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  opacity: 1;
  display: block;
}

/* 下部グラデーション */
#title-screen::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom,
      transparent 45%,
      rgba(10,0,20,0.7) 70%,
      rgba(10,0,20,0.95) 100%
    );
  pointer-events: none;
}

#title-screen > * { position: relative; z-index: 1; }

/* ボタンエリア */
#title-btn-area {
  width: 100%;
  padding: 0 28px 52px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
}

/* コピーライト */
#title-copyright {
  font-size: 10px;
  color: rgba(201,168,76,0.4);
  letter-spacing: 0.15em;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  margin-bottom: 4px;
}

/* はじめからボタン（メイン・光るやつ） */
.ts-btn {
  width: 100%;
  max-width: 320px;
  background: linear-gradient(135deg, rgba(123,63,160,0.9) 0%, rgba(80,20,130,0.95) 100%);
  border: 1px solid rgba(201,168,76,0.6);
  border-radius: 4px;
  padding: 16px 0;
  color: var(--white);
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: .38em;
  cursor: pointer;
  transition: all .28s;
  text-shadow: 0 0 12px rgba(201,168,76,0.5);
  box-shadow:
    0 0 20px rgba(123,63,160,0.4),
    inset 0 1px 0 rgba(255,255,255,0.1);
  position: relative;
  overflow: hidden;
}

.ts-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  transition: left 0.5s;
}

.ts-btn:hover::before, .ts-btn:active::before { left: 150%; }
.ts-btn:hover, .ts-btn:active {
  background: linear-gradient(135deg, rgba(150,80,200,0.95) 0%, rgba(100,30,160,1) 100%);
  border-color: var(--gold);
  box-shadow: 0 0 30px rgba(123,63,160,0.7), inset 0 1px 0 rgba(255,255,255,0.15);
}

/* つづきからボタン（サブ・落ち着いた） */
.ts-btn-sub {
  width: 100%;
  max-width: 320px;
  background: rgba(20,8,40,0.7);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 4px;
  padding: 14px 0;
  color: rgba(232,201,122,0.75);
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: .38em;
  cursor: pointer;
  transition: all .28s;
}

.ts-btn-sub:hover, .ts-btn-sub:active {
  background: rgba(45,20,80,0.8);
  border-color: rgba(201,168,76,0.6);
  color: var(--gold-l);
}

.ts-btn-sub.hidden { display: none; }

/* ── GAME SCREEN ── */
#game-screen {
  flex-direction: column;
  cursor: pointer;
}

/* image area */
#img-wrap {
  position:relative;
  flex:0 0 72%;
  overflow:hidden;
  background:var(--pur-deep);
}

#scene-img {
  width:100%; height:100%;
  object-fit:cover;
  object-position:center center;
  display:block;
  transition:opacity .5s;
}

#img-wrap::after {
  content:'';
  position:absolute;
  inset:0;
  background:
    linear-gradient(to bottom, transparent 35%, rgba(26,10,46,.88) 100%),
    linear-gradient(to right, rgba(26,10,46,.2) 0%, transparent 22%, transparent 78%, rgba(26,10,46,.2) 100%);
  pointer-events:none;
}

#img-wrap.no-img {
  background:
    radial-gradient(ellipse at 30% 55%, rgba(74,144,217,.2) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 30%, rgba(123,63,160,.3) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 85%, rgba(45,196,178,.12) 0%, transparent 45%),
    var(--pur-deep);
}

.ph-wrap {
  display:none;
  position:absolute; inset:0;
  align-items:center; justify-content:center;
  flex-direction:column; gap:10px;
  pointer-events:none;
}
#img-wrap.no-img .ph-wrap { display:flex; }
#img-wrap.no-img #scene-img { opacity:0; }
.ph-icon { font-size:34px; opacity:.28; }
.ph-text { font-size:11px; color:var(--gold); opacity:.3; letter-spacing:.2em; font-family:'Noto Sans JP',sans-serif; }

/* badges */
#chapter-badge {
  position:absolute; top:14px; left:16px;
  font-size:10px; color:var(--gold);
  letter-spacing:.2em; font-family:'Noto Sans JP',sans-serif;
  font-weight:300; opacity:.65; z-index:10;
}
#scene-title-lbl {
  position:absolute; top:16px; left:50%; transform:translateX(-50%);
  font-size:11px; letter-spacing:.22em; color:var(--gold-l);
  text-shadow:var(--shadow); font-family:'Noto Sans JP',sans-serif;
  font-weight:300; white-space:nowrap; z-index:10; opacity:.75;
}
#score-dots {
  position:absolute; top:14px; right:16px;
  display:flex; gap:6px; z-index:10;
}
.sdot {
  width:7px; height:7px; border-radius:50%;
  border:1px solid rgba(201,168,76,.35);
  transition:all .4s; background:transparent;
}
.sdot.light.on { background:#FFD700; border-color:#FFD700; box-shadow:0 0 6px #FFD700; }
.sdot.moon.on  { background:#C8D8F8; border-color:#C8D8F8; box-shadow:0 0 6px #C8D8F8; }
.sdot.fire.on  { background:#FF7755; border-color:#FF7755; box-shadow:0 0 6px #FF7755; }
.sdot.deep.on  { background:#BB88FF; border-color:#BB88FF; box-shadow:0 0 6px #BB88FF; }

/* text area */
#txt-area {
  flex:1;
  position:relative;
  background:linear-gradient(to bottom, rgba(26,10,46,.97) 0%, rgba(18,5,34,1) 100%);
  border-top:1px solid rgba(201,168,76,.18);
  display:flex; flex-direction:column;
  overflow:hidden; min-height:0;
}
#txt-area::before {
  content:'';
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:70px; height:1px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
}

#spk-name {
  font-size:11px; letter-spacing:.2em; color:var(--gold);
  font-family:'Noto Sans JP',sans-serif; font-weight:400;
  padding:11px 20px 3px; min-height:28px; flex-shrink:0;
}
#dlg-text {
  flex:1; padding:0 20px 40px;
  font-size:15px; line-height:1.9;
  color:var(--white); font-weight:300;
  overflow-y:auto; scrollbar-width:none; min-height:0;
  white-space:pre-wrap;
}
#dlg-text::-webkit-scrollbar { display:none; }
#dlg-text.narr { color:rgba(240,235,248,.72); font-style:italic; font-size:13.5px; letter-spacing:.03em; }
#dlg-text.thgt { color:rgba(210,190,255,.88); font-size:14px; font-style:italic; }
#dlg-text.sys  {
  color:var(--gold-l); font-family:'Noto Sans JP',sans-serif;
  font-size:13px; letter-spacing:.18em; text-align:center; padding-top:8px;
}
#dlg-text.chtr {
  color:var(--gold-l); font-family:'Noto Serif JP', serif;
  font-size:15px; font-weight:300; letter-spacing:.18em; text-align:center;
  line-height:2.2; padding-top:12px;
}

/* 話者カラー */
:root {
  --spk-yuwa:    #6ecfcf;   /* ターコイズブルー：ゆわ */
  --spk-jolly:   #c8d96b;   /* 黄緑ゴールド：じょりぃ */
  --spk-ibuki:   #a0b8cc;   /* スチールブルー：イブキ */
  --spk-kotoha:  #c4a8e8;   /* ラベンダー：コトハ */
  --spk-mamoru:  #e0a07a;   /* テラコッタ：マモル */
  --spk-lumina:  #e8c96a;   /* アンバー：ルミナ */
  --spk-shadow:  #b07acc;   /* 暗い紫：影・魔王系 */
}
.spk-yuwa   { color:var(--spk-yuwa)   !important; }
.spk-jolly  { color:var(--spk-jolly)  !important; }
.spk-ibuki  { color:var(--spk-ibuki)  !important; }
.spk-kotoha { color:var(--spk-kotoha) !important; }
.spk-mamoru { color:var(--spk-mamoru) !important; }
.spk-lumina { color:var(--spk-lumina) !important; }
.spk-shadow { color:var(--spk-shadow) !important; }
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

#tap-hint {
  position:absolute; bottom:12px; right:18px;
  font-size:10px; color:var(--gold); letter-spacing:.15em;
  font-family:'Noto Sans JP',sans-serif;
  animation:blink 2.2s ease-in-out infinite; pointer-events:none;
}
@keyframes blink { 0%,100%{opacity:.3} 50%{opacity:.85} }

/* choice panel */
#choice-panel {
  display:none; flex-direction:column;
  gap:7px; padding:10px 14px 14px;
  overflow-y:auto; scrollbar-width:none;
  flex:1; min-height:0;
  position:relative;
}
#choice-panel::-webkit-scrollbar { display:none; }
#choice-panel.show { display:flex; }

/* 選択肢「まだ下にあるよ」グラデーション */
#choice-fade {
  display:none;
  position:absolute; bottom:0; left:0; right:0; height:52px;
  background:linear-gradient(to bottom, transparent, rgba(18,5,34,.97));
  pointer-events:none; z-index:5;
  align-items:flex-end; justify-content:center;
  padding-bottom:6px;
}
#choice-fade.show { display:flex; }
#choice-fade-arrow {
  font-size:13px; color:var(--gold); opacity:.7;
  animation:blink 1.8s ease-in-out infinite;
}

.choice-lbl {
  font-size:10px; letter-spacing:.25em; color:var(--gold);
  font-family:'Noto Sans JP',sans-serif; font-weight:300;
  opacity:.75; padding:0 4px 3px; flex-shrink:0;
}
.cbtn {
  background:linear-gradient(135deg, rgba(45,20,87,.75) 0%, rgba(26,10,46,.88) 100%);
  border:1px solid rgba(201,168,76,.28);
  border-radius:5px; padding:9px 12px;
  color:var(--white); font-size:12.5px;
  font-family:'Noto Serif JP',serif; font-weight:300;
  line-height:1.5; text-align:left;
  cursor:pointer; transition:all .22s;
  position:relative; flex-shrink:0;
}
.cbtn::before {
  content:''; position:absolute;
  left:0; top:0; bottom:0; width:3px;
  background:var(--gold); border-radius:5px 0 0 5px;
  opacity:0; transition:opacity .2s;
}
.cbtn:hover::before, .cbtn:active::before { opacity:1; }
.cbtn:hover, .cbtn:active {
  border-color:rgba(201,168,76,.65);
  background:linear-gradient(135deg, rgba(60,28,105,.9) 0%, rgba(38,14,65,.95) 100%);
  transform:translateX(3px);
}

/* タイプライター画面 */
#typewriter-wrap {
  display:none; position:absolute; inset:0;
  background:rgba(10,3,22,0.97);
  flex-direction:column; align-items:center; justify-content:center;
  padding:32px 28px; z-index:30;
  cursor:pointer;
}
#typewriter-wrap.show { display:flex; }
#typewriter-text {
  font-family:'Noto Serif JP',serif; font-weight:300;
  font-size:13.5px; line-height:2.1; letter-spacing:.06em;
  color:rgba(235,225,210,0.92); white-space:pre-wrap;
  text-align:left; max-width:320px; width:100%;
}
#typewriter-hint {
  margin-top:28px; font-size:10px; letter-spacing:.28em;
  color:rgba(201,168,76,0.45); font-family:'Noto Sans JP',sans-serif;
  opacity:0; transition:opacity 1.2s;
}
#typewriter-hint.show { opacity:1; }
#name-input-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(20,6,40,.9); z-index:80;
  flex-direction:column; align-items:center; justify-content:center;
  gap:20px; padding:40px 28px;
}
#name-input-overlay.show { display:flex; }
.ni-label { font-size:11px; letter-spacing:.22em; color:var(--gold); font-family:'Noto Sans JP',sans-serif; }
#name-input {
  background:rgba(45,20,87,.5);
  border:1px solid rgba(201,168,76,.4);
  border-radius:4px; padding:12px 18px;
  color:var(--white); font-size:16px;
  font-family:'Noto Serif JP',serif; font-weight:300;
  text-align:center; width:100%; max-width:260px;
  outline:none; transition:border-color .2s;
}
#name-input:focus { border-color:var(--gold); }
#name-input::placeholder { color:rgba(240,235,248,.3); font-size:13px; }
.ni-btn {
  background:transparent;
  border:1px solid rgba(201,168,76,.45); border-radius:40px;
  padding:12px 38px; color:var(--gold-l);
  font-size:12.5px; font-family:'Noto Sans JP',sans-serif;
  letter-spacing:.28em; cursor:pointer; transition:all .28s;
}
.ni-btn:hover { background:rgba(201,168,76,.1); border-color:var(--gold); }

/* join banner */
#join-banner {
  display:none; position:fixed; inset:0;
  background:rgba(20,6,40,.85); z-index:80;
  align-items:center; justify-content:center;
}
#join-banner.show { display:flex; }
.jbox {
  background:linear-gradient(135deg, rgba(45,20,87,.95), rgba(26,10,46,.98));
  border:1px solid rgba(201,168,76,.4); border-radius:10px;
  padding:28px 36px; text-align:center;
  display:flex; flex-direction:column; gap:12px; align-items:center;
  max-width:280px;
}
.jicon { font-size:40px; }
.jtitle { font-size:10px; letter-spacing:.25em; color:var(--gold); font-family:'Noto Sans JP',sans-serif; }
.jname { font-size:22px; font-weight:700; }
.jsub { font-size:12px; color:rgba(240,235,248,.6); font-family:'Noto Sans JP',sans-serif; }
.jbtn {
  background:transparent; border:1px solid rgba(201,168,76,.4);
  border-radius:30px; padding:9px 28px;
  color:var(--gold-l); font-size:12px;
  font-family:'Noto Sans JP',sans-serif; letter-spacing:.2em;
  cursor:pointer; transition:all .2s;
}
.jbtn:hover { background:rgba(201,168,76,.1); }

/* ── RESULT SCREEN ── */
#result-screen {
  flex-direction:column; align-items:center; justify-content:center;
  gap:16px; padding:36px 28px; text-align:center;
  background:
    radial-gradient(ellipse at 50% 35%, rgba(123,63,160,.5) 0%, transparent 58%),
    var(--pur-deep);
  overflow-y:auto; scrollbar-width:none;
}
#result-screen::-webkit-scrollbar { display:none; }

.rs-eyebrow { font-family:'Noto Sans JP',sans-serif; font-size:10px; letter-spacing:.3em; color:var(--gold); opacity:.7; }
.rs-icon { font-size:50px; }
.rs-typename { font-size:24px; font-weight:700; line-height:1.45; text-shadow:0 0 30px rgba(123,63,160,.9); }
.rs-div { width:50px; height:1px; background:linear-gradient(to right,transparent,var(--gold),transparent); }
.rs-text { font-size:13px; color:rgba(240,235,248,.7); font-family:'Noto Sans JP',sans-serif; font-weight:300; line-height:1.9; max-width:300px; white-space:pre-wrap; }
.rs-scores { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:4px 0; }
.rs-pill {
  background:rgba(45,20,87,.55); border:1px solid rgba(201,168,76,.22);
  border-radius:20px; padding:5px 14px;
  font-size:11px; font-family:'Noto Sans JP',sans-serif;
  color:rgba(240,235,248,.65);
}
.rs-pill.win { border-color:var(--gold); color:var(--gold-l); background:rgba(65,30,110,.75); }

.rs-common-title { font-size:16px; font-weight:700; color:var(--gold-l); margin-top:8px; }
.rs-common-text { font-size:13px; color:rgba(240,235,248,.75); font-family:'Noto Sans JP',sans-serif; font-weight:300; line-height:1.9; max-width:300px; white-space:pre-wrap; }

.rs-btn {
  background:transparent; border:1px solid rgba(201,168,76,.45);
  border-radius:40px; padding:12px 36px; color:var(--gold-l);
  font-size:12.5px; font-family:'Noto Sans JP',sans-serif;
  letter-spacing:.22em; cursor:pointer; transition:all .28s; margin-top:8px;
}
.rs-btn:hover { background:rgba(201,168,76,.1); border-color:var(--gold); }

/* mute button */
#mute-btn {
  position:absolute; bottom:12px; right:12px;
  width:26px; height:26px; border-radius:50%;
  background:rgba(26,10,46,0.7);
  border:1px solid rgba(201,168,76,0.3);
  color:var(--gold-l); font-size:11px;
  cursor:pointer; z-index:20;
  display:flex; align-items:center; justify-content:center;
  transition:all .25s;
}
#pause-btn {
  position:absolute; bottom:12px; right:46px;
  width:26px; height:26px; border-radius:50%;
  background:rgba(26,10,46,0.7);
  border:1px solid rgba(201,168,76,0.3);
  color:var(--gold-l); font-size:11px;
  cursor:pointer; z-index:20;
  display:flex; align-items:center; justify-content:center;
  transition:all .25s;
}

/* 一時停止確認ダイアログ */
#pause-dialog {
  display:none; position:fixed; inset:0; z-index:90;
  background:rgba(10,3,22,0.88);
  flex-direction:column; align-items:center; justify-content:center;
  gap:18px;
}
#pause-dialog.show { display:flex; }
#pause-dialog .pd-title {
  font-family:'Noto Serif JP',serif; font-size:15px;
  color:var(--gold-l); letter-spacing:.12em;
}
#pause-dialog .pd-sub {
  font-family:'Noto Sans JP',sans-serif; font-size:11px;
  color:rgba(235,225,210,0.6); letter-spacing:.08em; text-align:center;
  line-height:1.8;
}
#pause-dialog .pd-btn {
  padding:10px 32px; border-radius:20px;
  font-family:'Noto Sans JP',sans-serif; font-size:12px;
  letter-spacing:.2em; cursor:pointer; transition:all .22s;
}
#pause-dialog .pd-btn-ok {
  background:rgba(45,20,87,.8);
  border:1px solid rgba(201,168,76,.5);
  color:var(--gold-l);
}
#pause-dialog .pd-btn-cancel {
  background:transparent;
  border:1px solid rgba(235,225,210,0.2);
  color:rgba(235,225,210,0.5);
}

/* transition */
#ov {
  position:fixed; inset:0; background:var(--pur-deep);
  z-index:100; pointer-events:none; opacity:0; transition:opacity .45s;
}
#ov.on { opacity:1; pointer-events:all; }
</style>
</head>
<body>

<div id="ov"></div>

<!-- TITLE SCREEN -->
<div id="title-screen" class="screen active">
  <img id="title-bg-img" src="title-bg.png" alt="" onerror="this.style.display='none'">
  <div id="title-btn-area">
    <div id="title-copyright">© yuwa Bloom Realm</div>
    <button class="ts-btn" onclick="startTitle()">は じ め か ら</button>
    <button class="ts-btn-sub hidden" id="continue-btn" onclick="continueGame()">つ づ き か ら</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div id="img-wrap" class="no-img">
    <img id="scene-img" src="" alt="" onerror="document.getElementById('img-wrap').classList.add('no-img')" onload="document.getElementById('img-wrap').classList.remove('no-img')">
    <div class="ph-wrap">
      <div class="ph-icon">🌫</div>
      <div class="ph-text" id="ph-txt"></div>
    </div>
    <div id="chapter-badge"></div>
    <div id="scene-title-lbl"></div>
    <div id="score-dots">
      <div class="sdot light" id="d-light"></div>
      <div class="sdot moon"  id="d-moon"></div>
      <div class="sdot fire"  id="d-fire"></div>
      <div class="sdot deep"  id="d-deep"></div>
    </div>
    <button id="mute-btn" onclick="toggleMute()" title="音楽ON/OFF">🔊</button>
    <button id="pause-btn" onclick="showPauseDialog()" title="一時保存して終了">⏸</button>
  </div>

  <!-- 一時停止確認ダイアログ -->
  <div id="pause-dialog">
    <div class="pd-title">ここで一時停止しますか？</div>

<script>
// ═══════════════════════════════════════════

// ═══════════════════════════════════════════
const SCORE_TYPES = {

};

// スコアキー（エンディングのendingScoreKeysとの対応）
const ENDING_SCORE_MAP = {
  ibuki:"light", kotoha:"moon", mamoru:"fire", lumina:"deep"
};

// JOIN BANNERS
const JOIN_DATA = {
  "イブキ加入":  { icon:"⚔️", name:"イブキ", sub:"孤高の剣士" },
  "コトハ加入": { icon:"🪄", name:"コトハ", sub:"言葉の魔法使い" },
  "マモル加入": { icon:"🛡", name:"マモル", sub:"守りの戦士" }
};

// ═══════════════════════════════════════════
// BGM ENGINE
// ═══════════════════════════════════════════
const BGM = {
  title:   'BGM_05_ending_Frozen_Fjord.mp3',  // タイトル〜プロローグ（ending曲を流用）
  field:   'BGM_02_forest_Nocturnal_Bloom.mp3', // 第1章
  healing: 'BGM_03_healing_Mystic_Tides.mp3',   // 第2章
  explore: 'BGM_04_explore_Dual_Illusions.mp3', // 第3章
  lumina:  'BGM_08_lumina_Forest_Sage.mp3',     // 第4章
  tower:   'BGM_09_maou_tower_Foreboding.mp3',  // 第5章
  battle:  'BGM_06_battle_Sword_Flash.mp3',     // 通常戦闘
  boss:    'BGM_07_boss_EpicBattle_Deity.mp3',  // ボス戦
  ending:  'BGM_05_ending_Frozen_Fjord.mp3',    // エンディング（同じ曲で回収）
  fin:     'BGM_10_fin_Moonlit_Overture.mp3'    // FIN余韻用（任意）
};

// ループしない曲（曲が終わったら最初から再生）
const BGM_NO_LOOP = new Set(['title', 'ending', 'fin']);

// 章ごとのBGM
// 章ごとのBGMマップ（シーン個別切り替えなし・章単位で固定）
const SCENE_BGM_MAP = {
  prologue:  'title',
  chapter1:  'field',
  chapter2:  'healing',
  chapter3:  'explore',
  chapter4:  'lumina',
  chapter5:  'tower',
  ending:    'ending',
};

// シーン個別BGM設定は全て廃止（章固定方式）
const BATTLE_SCENES   = new Set([]);
const BOSS_SCENES     = new Set([]);
const BATTLE_END_SCENES = new Set([]);
const FIN_SCENES      = new Set(['ending-07']);
const ENDING_SCENES   = new Set([
  'ending-01','ending-02','ending-03',
  'ending-04','ending-05','ending-06'
]);
const HEALING_SCENES  = new Set([]);

let bgmAudio = null;
let currentBGMKey = null;
let isMuted = false;
let bgmSupported = true;
const BGM_VOLUME = 0.3; // 小さめ（文章の邪魔にならない程度）

function playBGM(key) {
  if (!bgmSupported || isMuted) return;
  if (key === currentBGMKey) return;
  const file = BGM[key];
  if (!file) return;
  try {
    if (bgmAudio && !bgmAudio.paused) {
      fadeBGM(bgmAudio, () => switchBGM(key, file));
    } else {
      switchBGM(key, file);
    }
  } catch(e) { bgmSupported = false; }
}

function switchBGM(key, file) {
  try {
    if (bgmAudio) { bgmAudio.pause(); bgmAudio = null; }
    currentBGMKey = key;
    const audio = new Audio(file);
    // ループしない曲は ended で最初から再生
    if (BGM_NO_LOOP.has(key)) {
      audio.loop = false;
      audio.addEventListener('ended', () => {
        try { audio.currentTime = 0; audio.play().catch(()=>{}); } catch(e) {}
      });
    } else {
      audio.loop = true;
    }
    audio.volume = 0;
    bgmAudio = audio;
    const p = audio.play();
    if (p && p.catch) p.catch(() => {});
    fadeInBGM(audio, BGM_VOLUME);
  } catch(e) { bgmSupported = false; }
}

function fadeBGM(audio, cb) {
  try {
    const step = 0.03;
    const iv = setInterval(() => {
      try {
        if (audio.volume > step) { audio.volume -= step; }
        else { audio.volume = 0; audio.pause(); clearInterval(iv); if (cb) cb(); }
      } catch(e) { clearInterval(iv); if (cb) cb(); }
    }, 40);
  } catch(e) { if (cb) cb(); }
}

function fadeInBGM(audio, targetVol) {
  try {
    const step = 0.02;
    const iv = setInterval(() => {
      try {
        if (audio.volume < targetVol - step) { audio.volume += step; }
        else { audio.volume = targetVol; clearInterval(iv); }
      } catch(e) { clearInterval(iv); }
    }, 40);
  } catch(e) {}
}

function toggleMute() {
  try {
    isMuted = !isMuted;
    document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🔊';
    if (isMuted) {
      // 完全に停止
      if (bgmAudio) {
        bgmAudio.pause();
        bgmAudio.volume = 0;
      }
    } else {
      // ミュート解除→currentBGMKeyの曲を再生
      if (currentBGMKey) {
        const key = currentBGMKey;
        currentBGMKey = null; // 同じkeyでもplayBGMが通るようにリセット
        playBGM(key);
      }
    }
  } catch(e) {}
}

function getBGMKeyForStep(step) {
  const sid = step.sceneId || step.id || '';
  const cid = step.chapterId || '';

  // FINシーン
  if (step.isFin || FIN_SCENES.has(sid)) return 'fin';

  // エンディングシーン
  if (ENDING_SCENES.has(sid)) return 'ending';

  // 章固定BGM
  return SCENE_BGM_MAP[cid] || 'field';
}

function updateBGMForStep(step) {
  const key = getBGMKeyForStep(step);
  playBGM(key);
}

// ═══════════════════════════════════════════
// CHAPTER BADGES

};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let playerName = "あなた";
let scores = { light:0, moon:0, fire:0, deep:0 };

// scene queue - flat list of "micro-steps"
// each step: { type, imageId, speaker, text, choices, nextId, chapterId }
let steps = [];

let waitingName = false;

// ═══════════════════════════════════════════

const $img     = document.getElementById('scene-img');

// ═══════════════════════════════════════════
// NAME REPLACE
// ═══════════════════════════════════════════
function N(s) {
  if (!s) return s;
  return s.replace(/\{\{name\}\}/g, playerName).replace(/\bname\b/g, playerName);

// ═══════════════════════════════════════════
// SAVE / LOAD（メモリベース・Claude.ai対応）
// ═══════════════════════════════════════════
const SAVE_KEY = 'kage_maou_save';

// まずlocalStorageが使えるか安全に確認
const SafeStorage = (function() {
  let _ls = null;
  let _mem = {}; // フォールバック用メモリストレージ

  // 使用可能チェック（一度だけ）
  try {
    const test = '__test__';
    window.localStorage.setItem(test, '1');
    window.localStorage.removeItem(test);
    _ls = window.localStorage;
  } catch(e) {
    _ls = null; // 使えない環境はメモリで代替
  }

  return {
    get(key) {
      try {
        if (_ls) return _ls.getItem(key);
        return _mem[key] || null;
      } catch(e) { return _mem[key] || null; }
    },
    set(key, val) {
      try {
        if (_ls) _ls.setItem(key, val);
        else _mem[key] = val;
      } catch(e) { _mem[key] = val; }
    },
    remove(key) {
      try {
        if (_ls) _ls.removeItem(key);
        delete _mem[key];
      } catch(e) { delete _mem[key]; }
    }
  };
})();

function saveProgress() {
  try {
    // 現在の章IDも保存して、続きから時に章先頭に安全ジャンプできるようにする
    const currentStep = steps[stepIdx];
    const currentChapterId = currentStep ? currentStep.chapterId : null;
    const data = { playerName, scores, lastScore, stepIdx, currentChapterId };
    SafeStorage.set(SAVE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function loadProgress() {
  try {
    const raw = SafeStorage.get(SAVE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function checkContinue() {
  try {
    const saved = loadProgress();
    const btn = document.getElementById('continue-btn');
    if (saved && saved.stepIdx > 0 && btn) {
      btn.classList.remove('hidden');
    }
  } catch(e) {}
}

function continueGame() {
  const saved = loadProgress();
  if (!saved) return;
  playerName = saved.playerName || 'あなた';
  scores = saved.scores || { light:0, moon:0, fire:0, deep:0 };
  lastScore = saved.lastScore || null;

  document.getElementById('title-screen').classList.remove('active');
  document.getElementById('game-screen').classList.add('active');

  buildAllSteps();

  // 保存された章IDの最初のstepへジャンプ
  const savedChapterId = saved.currentChapterId;
  const savedStepIdx = saved.stepIdx || 0;

  if (savedChapterId) {
    const chapterStart = steps.findIndex(s => s.chapterId === savedChapterId);
    stepIdx = chapterStart >= 0 ? chapterStart : Math.min(savedStepIdx, steps.length - 1);
  } else {
    stepIdx = Math.min(savedStepIdx, steps.length - 1);
  }

  updateScoreDots();
  const step = steps[stepIdx];
  if (step) updateBGMForStep(step);
  showStep();
}

// ─── 起動時チェック ───
function onAppReady() {

if (document.readyState === 'loading') {

// TITLE → GAME

// ═══════════════════════════════════════════
// STEP BUILDER — converts all chapters to flat step array
// ═══════════════════════════════════════════
function buildAllSteps() {
  steps = [];

  // タイトルカード挿入ヘルパー
  function pushTitleCard(chapterNum, title, subtitle, imageId, cid) {
    pushStep({
      type: 'chapterTransition',
      imageId: imageId || '',
      chapterId: cid,
      speaker: '',
      text: subtitle ? `${chapterNum}\n${subtitle}` : chapterNum,
      title: ''
    });
  }

  buildPrologue();

  // 第1章タイトルカード（プロローグのendCardから自動生成されるので不要）
  buildChapter1();

  // 第2章タイトルカード
  pushTitleCard('第 2 章', '', '忘れられた神殿と、言えなかった言葉', '2-1.png', 'chapter2');
  buildChapter2();

  // 第3章タイトルカード
  pushTitleCard('第 3 章', '', '嘆きの谷と、泣けなかった盾', '3-1.png', 'chapter3');
  buildChapter3();

  // 第4章タイトルカード
  pushTitleCard('第 4 章', '', '星灯りの村と、居場所をなくした灯', '4-1.png', 'chapter4');
  buildChapter4();

  // 第5章タイトルカード
  pushTitleCard('第 5 章', '', '影の魔王との最終戦', '5-1.png', 'chapter5');
  buildChapter5();

  buildEnding();

  stepIdx = 0;
}

// ── HELPERS ──
function pushStep(obj) { steps.push(obj); }

function pushLines(lines, imageId, chapterId, titleHint, sceneId) {
  (lines || []).forEach(line => {
    const t = line.type || detectType(line.speaker);
    const text = Array.isArray(line.text) ? line.text.join('\n') : (line.text || '');
    pushStep({
      type: t, imageId, chapterId,
      speaker: line.speaker || '',
      text, title: titleHint || '',
      sceneId: sceneId || ''
    });
  });
}

function detectType(speaker) {
  if (!speaker || speaker === 'narration' || speaker === '—' || speaker === 'narr') return 'narration';
  if (speaker && speaker.includes('心の声')) return 'thought';
  return 'dialogue';
}

function pushBlocks(blocks, imageId, chapterId, titleHint, sceneId) {
  // blocks: {speaker, text} where speaker "—" = narration
  (blocks || []).forEach(b => {
    const isSpeaker = b.speaker && b.speaker !== '—';
    const t = !isSpeaker ? 'narration'
      : b.speaker.includes('心の声') ? 'thought'
      : 'dialogue';
    const text = Array.isArray(b.text) ? b.text.join('\n') : (b.text || '');
    pushStep({ type:t, imageId, chapterId, speaker:b.speaker||'', text, title:titleHint||'', sceneId: sceneId||'' });
  });
}

function pushChoice(prompt, options, imageId, chapterId, titleHint) {
  pushStep({
    type:'choice', imageId, chapterId,
    speaker:'', text: prompt || 'どうする？',
    title: titleHint || '',
    choices: options
  });
}

function pushSystem(text, imageId, chapterId) {
  pushStep({ type:'system', imageId, chapterId, speaker:'', text });
}

function pushChapterTransition(lines, imageId, chapterId) {
  const text = Array.isArray(lines) ? lines.join('\n') : lines;
  pushStep({ type:'chapterTransition', imageId, chapterId, speaker:'', text });
}

// img helper
function resolveImg(id, chapterId) {
  if (!id) return '';
  // Already has extension
  if (id.includes('.')) return id;
  // prologue: p-0 → p-0.png
  if (id.startsWith('p-')) return `${id}.png`;
  // ending: 5-17 etc
  if (/^\d+-\d+$/.test(id) && parseInt(id) >= 5) return `${id}.png`;
  return `${id}.png`;
}

// ═══════════════════════════════════════════
// PROLOGUE BUILDER
// ═══════════════════════════════════════════
function buildPrologue() {
  const cid = 'prologue';
  const scenes = PROLOGUE_DATA.scenes;
  const sceneMap = {};
  scenes.forEach(s => sceneMap[s.id] = s);

  const visited = new Set();
  let curId = scenes[0].id;

  while (curId && curId !== 'chapter1' && !visited.has(curId)) {
    visited.add(curId);
    const sc = sceneMap[curId];
    if (!sc) break;

    const img = sc.imageId && sc.imageId.includes('.png') ? sc.imageId : resolveImg(sc.imageId, cid);

    // narrationBlock / dialogueBlock → pages配列を1タップずつに展開
    if (sc.type === 'narrationBlock' || sc.type === 'dialogueBlock') {
      const spk = sc.speaker || '';
      (sc.pages || []).forEach(page => {
        // pageは文字列配列。「\n」や「speaker\ntext」形式を処理
        const lines = Array.isArray(page) ? page : [page];
        // speakerとtextを分離（"じょりぃ\nテキスト" 形式対応）
        let speaker = spk;
        let textLines = lines;

        if (lines.length > 0 && lines[0].includes('\n')) {
          const parts = lines[0].split('\n');
          speaker = parts[0];
          textLines = [parts.slice(1).join('\n'), ...lines.slice(1)];
        } else if (lines.length >= 2 && !lines[0].includes('。') && !lines[0].includes('……') && !lines[0].includes('——') && lines[0].length <= 12) {
          // 短い行がspeakerの可能性（「じょりぃ」「{{name}}」など）
          const possibleSpeaker = lines[0];
          if (['じょりぃ','イブキ','コトハ','マモル','おじいちゃん'].some(s => possibleSpeaker.includes(s)) || possibleSpeaker.includes('{{name}}')) {
            speaker = possibleSpeaker;
            textLines = lines.slice(1);
          }
        }

        // 心の声判定
        const isThought = speaker.includes('心の声') || speaker.includes('（心の声）');
        const isNarr = sc.type === 'narrationBlock' && !speaker;
        const type = isThought ? 'thought' : isNarr ? 'narration' : 'dialogue';
        const text = textLines.join('\n');
        pushStep({ type, imageId:img, chapterId:cid, speaker:N(speaker), text:N(text), title:'' });
      });

      // endCard（章タイトルカード）
      if (sc.endCard) {
        pushStep({ type:'chapterTransition', imageId:img, chapterId:'chapter1', speaker:'',
          text:`${sc.endCard.title}\n${sc.endCard.subtitle}`, title:'' });
      }

    } else if (sc.type === 'nameInput') {
      const text = Array.isArray(sc.text) ? sc.text.join('\n') : sc.text;
      pushStep({ type:'nameInput', imageId:img, chapterId:cid, speaker:sc.speaker||'', text:N(text), title:'' });

    } else if (sc.type === 'choice') {
      const text = Array.isArray(sc.text) ? sc.text.join('\n') : sc.text;
      const opts = (sc.choices || []).map(c => ({
        label: c.label,
        score: c.effects || {},
        inlineNextId: c.next,
        afterLines: []
      }));
      pushStep({ type:'choice', imageId:img, chapterId:cid, speaker:sc.speaker||'', text:N(text), title:'', choices:opts, prologueSceneMap:sceneMap });
    }

    curId = sc.next || null;
  }
}

// ═══════════════════════════════════════════
// CHAPTER 1 BUILDER
// ═══════════════════════════════════════════
function buildChapter1() {
  const cid = 'chapter1';
  const scenes = CH1_DATA.scenes;
  const sceneMap = {};
  scenes.forEach(s => sceneMap[s.id] = s);

  // ── フェーズ1：直線（1-1〜1-5の選択肢まで）──
  ['1-1','1-2','1-3','1-4'].forEach(sid => {
    const sc = sceneMap[sid];
    if (!sc) return;
    pushLines(sc.lines, resolveImg(sc.image||'', cid), cid, sc.title||'', sid);
  });

  // 1-5：第1選択肢（1-5-x→1-6-x→1-7-1共通→1-7-2→1-7-3の選択肢まで動的展開）
  const sc5 = sceneMap['1-5'];
  if (sc5) {
    const img5 = resolveImg(sc5.image||'', cid);
    pushLines(sc5.lines, img5, cid, sc5.title||'', '1-5');
    const opts5 = sc5.choices.map(c => ({
      label: c.text, score: c.score||{}, inlineNextId: c.next, afterLines:[]
    }));
    pushStep({ type:'choice', imageId:img5, chapterId:cid, speaker:'', text:'', title:sc5.title||'', choices:opts5, ch1SceneMap:sceneMap });
  }

  // ── フェーズ2：合流後の共通シーン（1-8〜1-9）は直接mainFlowに置く ──
  // 1-7-4-x の分岐は「1-7-3の選択肢」injectで展開されるが、
  // そのnextは全て'1-8'を指す→ch1SceneMapで1-8以降を展開するとまた重複する
  // → collectBranchStepsを '1-8' で止めて、1-8・1-9はここで直接出力
  ['1-8','1-9'].forEach(sid => {
    const sc = sceneMap[sid];
    if (!sc) return;
    pushLines(sc.lines, resolveImg(sc.image||'', cid), cid, sc.title||'', sid);
  });

  // イブキ加入バナー（chapterIdをchapter2にしてdismiss後にhealingBGMへ自動切り替え）
  pushStep({ type:'joinBanner', chapterId:'chapter2', imageId:'', joinKey:'イブキ加入', speaker:'', text:'', title:'' });
}

function buildChapter2() {
  const cid = 'chapter2';
  const scenes = CH2_DATA.scenes;

  scenes.forEach(sc => {
    const img = resolveImg(sc.image, cid);
    const title = sc.title || '';

    // main content
    const contentLines = (sc.content || []).map(l => ({
      ...l,
      speaker: l.speaker === 'name' ? '{{name}}' : l.speaker,
      text: typeof l.text === 'string' ? l.text.replace(/\bname\b/g,'{{name}}') : l.text
    }));
    pushLines(contentLines, img, cid, title);

    if (sc.choices && sc.choices.length) {
      // choices with choiceResponses
      const opts = sc.choices.map(c => ({
        label: c.text,
        score: c.score ? { [c.score]: c.point||1 } : {},
        afterLines: sc.choiceResponses ? (sc.choiceResponses[c.id] || []) : [],
        afterImg: img,
        mergeLines: sc.afterChoice || [],
        mergeImg: img
      }));
      pushStep({ type:'choice', imageId:img, chapterId:cid, speaker:'', text:'', title, choices:opts, hasAfterChoice:true });
    }
  });
}

// ═══════════════════════════════════════════
// CHAPTER 3 BUILDER
// ═══════════════════════════════════════════
function buildChapter3() {
  const cid = 'chapter3';
  const scenes = CH3_DATA.scenes;
  const sceneMap = {};
  scenes.forEach(s => sceneMap[s.id] = s);

  const visited = new Set();
  let curId = scenes[0].id;

  while (curId && !visited.has(curId)) {
    visited.add(curId);
    const sc = sceneMap[curId];
    if (!sc) break;

    const img = resolveImg(sc.image || sc.imageId, cid);
    const title = sc.title || '';

    if (sc.type === 'story') {
      pushLines(sc.lines, img, cid, title, sc.id);
    } else if (sc.type === 'choice') {
      pushLines(sc.lines, img, cid, title, sc.id);
      const opts = (sc.choice?.options || []).map(o => ({
        label: o.label,
        score: o.score || {},
        afterLines: o.after_lines || [],
        afterImg: resolveImg(o.image, cid) || img
      }));
      pushStep({ type:'choice', imageId:img, chapterId:cid, speaker:'', text:sc.choice?.question||'', title, choices:opts });
    }

    // マモル加入
    if (sc.id === '3-13') {
      // inject join banner step after scene
      pushStep({ type:'joinBanner', chapterId:cid, imageId:img, joinKey:'マモル加入', speaker:'', text:'', title:'' });
    }

    curId = sc.next || null;
  }
}

// ═══════════════════════════════════════════
// STEP DISPLAY ENGINE
// ═══════════════════════════════════════════
function showStep() {
  if (stepIdx >= steps.length) {
    // FINシーンまで終わった場合は何もしない（最初からボタンが表示済み）
    return;
  }
  const step = steps[stepIdx];

  updateBadge(step.chapterId);
  updateScoreDots();
  updateBGMForStep(step);

  const type = step.type;

  if (type === 'resultScreen') { showResultScreen(); return; }

  if (type === 'typewriter') {
    setImage('', step.title);
    showTypewriter(step.text);
    return;
  }

  if (type === 'nameInput') {
    setImage(step.imageId, step.title);
    showNameInput();
    return;
  }

  if (type === 'joinBanner') {
    showJoinBanner(step.joinKey);
    return;
  }

  if (type === 'choice') {
    setImage(step.imageId, step.title);
    showChoiceStep(step);
    return;
  }

  if (type === 'chapterTransition') {
    setImage(step.imageId, step.title);
    const parts = N(step.text).split('\n');
    const chNum = parts[0] || '';
    const chSub = parts.slice(1).join('');
    $spk.textContent = '';
    $txt.className = 'chtr fade-up';
    $txt.innerHTML = `<span style="font-size:11px;letter-spacing:.38em;color:var(--gold);opacity:.85;font-family:'Noto Sans JP',sans-serif;">${chNum}</span>`
      + (chSub ? `<br><span style="display:block;width:44px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:12px auto 10px;"></span><span style="font-size:14px;letter-spacing:.15em;">${chSub}</span>` : '');
    $txt.style.display = '';
    $tapHint.style.display = '';
    $choiceFade.classList.remove('show');
    return;
  }

  if (type === 'system') {
    setImage(step.imageId, step.title);
    const key = step.text;
    if (key && JOIN_DATA[key]) { showJoinBanner(key); return; }
    showDialogue('sys', '', N(step.text || ''));
    return;
  }

  // narration / thought / dialogue
  setImage(step.imageId, step.title);

  // FINシーンの最後のstep（次がない）→「最初から」ボタン表示
  const isLastStep = stepIdx >= steps.length - 1;
  if (isLastStep && step.chapterId === 'ending') {
    showDialogue(type === 'narration' ? 'narr' : (type === 'thought' ? 'thgt' : ''),
      type === 'thought' ? (step.speaker ? `◇ ${N(step.speaker)}` : '') : (N(step.speaker) || ''),
      N(step.text));
    // 「最初から」ボタンをtapHintの代わりに表示
    $tapHint.style.display = 'none';
    const existingBtn = document.getElementById('restart-fin-btn');
    if (!existingBtn) {
      const btn = document.createElement('button');
      btn.id = 'restart-fin-btn';
      btn.textContent = '最 初 か ら';
      btn.style.cssText = 'display:block;margin:18px auto 0;padding:10px 28px;background:rgba(45,20,87,.7);border:1px solid rgba(201,168,76,.4);border-radius:20px;color:rgba(201,168,76,.9);font-size:12px;letter-spacing:.3em;font-family:"Noto Sans JP",sans-serif;cursor:pointer;';
      btn.onclick = () => location.reload();
      $txt.parentNode.appendChild(btn);
    }
    return;
  }

  if (type === 'narration') {
    showDialogue('narr', '', N(step.text));
  } else if (type === 'thought') {
    const spk = step.speaker ? `◇ ${N(step.speaker)}` : '';
    showDialogue('thgt', spk, N(step.text));
  } else {
    showDialogue('', N(step.speaker) || '', N(step.text));
  }
}

function getSpeakerClass(speaker) {
  if (!speaker) return '';
  const s = speaker.replace(/[（()）]/g, '').toLowerCase();
  if (s.includes('{{name}}') || s.includes('ゆわ') || s.includes('name')) return 'spk-yuwa';
  if (s.includes('じょりぃ') || s.includes('じょり')) return 'spk-jolly';
  if (s.includes('イブキ') || s.includes('いぶき')) return 'spk-ibuki';
  if (s.includes('コトハ') || s.includes('ことは')) return 'spk-kotoha';
  if (s.includes('マモル') || s.includes('まもる')) return 'spk-mamoru';
  if (s.includes('ルミナ') || s.includes('るみな')) return 'spk-lumina';
  if (s.includes('影') || s.includes('魔王') || s.includes('闇') || s.includes('小さな声') || s.includes('幼い')) return 'spk-shadow';
  return '';
}

function showDialogue(cls, speaker, text) {
  hideChoices();
  $spk.textContent = speaker;
  $spk.className = getSpeakerClass(speaker); // 話者カラー適用
  $txt.className = cls ? `${cls} fade-up` : 'fade-up';
  $txt.textContent = text;
  $txt.style.display = '';
  $tapHint.style.display = '';
}

function hideChoices() {
  $choices.innerHTML = '<div class="choice-lbl">— どう声をかける？ —</div>';
  $choices.classList.remove('show');
  $choiceFade.classList.remove('show');
}

// ═══════════════════════════════════════════
// CHOICE DISPLAY
// ═══════════════════════════════════════════
function showChoiceStep(step) {
  waitingChoice = true;
  $spk.textContent = '';
  $txt.style.display = 'none';
  $tapHint.style.display = 'none';

  $choices.innerHTML = '<div class="choice-lbl">— どう声をかける？ —</div>';
  (step.choices || []).forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cbtn';
    btn.textContent = N(c.label);
    btn.onclick = e => { e.stopPropagation(); selectChoice(step, c); };
    $choices.appendChild(btn);
  });
  $choices.classList.add('show');

  // スクロールで▼インジケーター制御
  setTimeout(() => updateChoiceFade(), 80);
  $choices.onscroll = () => updateChoiceFade();
}

function updateChoiceFade() {
  const el = $choices;
  const canScroll = el.scrollHeight > el.clientHeight + 4;
  const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 8;
  if (canScroll && !atBottom) {
    $choiceFade.classList.add('show');
  } else {
    $choiceFade.classList.remove('show');
  }
}

function selectChoice(step, choice) {
  waitingChoice = false;
  hideChoices();
  $txt.style.display = '';
  $tapHint.style.display = '';

  // score
  const sc = choice.score || {};
  for (const [k,v] of Object.entries(sc)) {
    if (scores[k] !== undefined) {
      scores[k] += (v || 1);
      lastScore = k;
    }
  }
  updateScoreDots();

  // Build inline steps to inject
  const inject = [];
  const cid = step.chapterId;

  // Chapter 1 / 3 style: afterLines + merge to next
  if (choice.afterLines && choice.afterLines.length) {
    const img = choice.afterImg || step.imageId;
    choice.afterLines.forEach(l => {
      const t = l.type || detectType(l.speaker);
      const text = Array.isArray(l.text) ? l.text.join('\n') : (l.text||'');
      inject.push({ type:t, imageId:img, chapterId:cid, speaker:l.speaker||'', text, title:'' });
    });
  }

  // Chapter 2 style: choiceResponses afterLines + mergeLines (afterChoice)
  if (choice.mergeLines && choice.mergeLines.length) {
    const img = choice.mergeImg || step.imageId;
    choice.mergeLines.forEach(l => {
      const t = l.type || detectType(l.speaker);
      const text = Array.isArray(l.text) ? l.text.join('\n') : (l.text||'');
      inject.push({ type:t, imageId:img, chapterId:cid, speaker:l.speaker||'', text, title:'' });
    });
  }

  // Prologue style: choiceMap
  if (step.choiceMap && step.choiceMap[choice.label]) {
    step.choiceMap[choice.label].forEach(s => inject.push(s));
  }

  // Prologue pages形式: prologueSceneMap
  if (choice.inlineNextId && step.prologueSceneMap) {
    const branchSteps = collectPrologueBranch(choice.inlineNextId, step.prologueSceneMap, cid);
    branchSteps.forEach(s => inject.push(s));
  // Chapter 4/5 style: inlineNextId (jump to scene and continue)
  } else if (choice.inlineNextId) {
    const sceneMap = step.ch1SceneMap || step.ch4SceneMap || step.ch5SceneMap;
    if (sceneMap) {
      const branchSteps = collectBranchSteps(choice.inlineNextId, sceneMap, cid);
      branchSteps.forEach(s => inject.push(s));
    }
  }

  // inject steps after current
  if (inject.length) {
    steps.splice(stepIdx + 1, 0, ...inject);
  }

  stepIdx++;
  saveProgress();
  showStep();
}

function collectPrologueBranch(startId, sceneMap, cid) {
  const result = [];
  const visited = new Set();
  let curId = startId;
  const MERGE = 'prologue-p12'; // 合流点

  while (curId && curId !== MERGE && curId !== 'chapter1' && !visited.has(curId)) {
    visited.add(curId);
    const sc = sceneMap[curId];
    if (!sc) break;

    const img = sc.imageId && sc.imageId.includes('.png') ? sc.imageId : resolveImg(sc.imageId, cid);
    const spk = sc.speaker || '';

    (sc.pages || []).forEach(page => {
      const lines = Array.isArray(page) ? page : [page];
      let speaker = spk;
      let textLines = lines;

      if (lines.length > 0 && lines[0].includes('\n')) {
        const parts = lines[0].split('\n');
        speaker = parts[0];
        textLines = [parts.slice(1).join('\n'), ...lines.slice(1)];
      } else if (lines.length >= 2) {
        const possibleSpeaker = lines[0];
        if (['じょりぃ','イブキ','コトハ','マモル','おじいちゃん'].some(s => possibleSpeaker.includes(s)) || possibleSpeaker.includes('{{name}}')) {
          speaker = possibleSpeaker;
          textLines = lines.slice(1);
        }
      }

      const isThought = speaker.includes('心の声') || speaker.includes('（心の声）');
      const type = isThought ? 'thought' : (speaker ? 'dialogue' : 'narration');
      result.push({ type, imageId:img, chapterId:cid, speaker:N(speaker), text:N(textLines.join('\n')), title:'' });
    });

    curId = sc.next || null;
  }
  return result;
}

function collectBranchSteps(startId, sceneMap, cid) {
  const result = [];
  const visited = new Set();
  let curId = startId;
  // 章境界＋第1章合流点：これらのIDに到達したら止める
  const CHAPTER_STOPS = new Set(['chapter_2','chapter2','chapter_3','chapter3','chapter_4','chapter4','chapter_5','chapter5','ending','1-8']);

  while (curId && !visited.has(curId) && !CHAPTER_STOPS.has(curId)) {
    visited.add(curId);
    const sc = sceneMap[curId];
    if (!sc) break;

    const img = resolveImg(sc.image || sc.imageId, cid);
    const title = sc.title || '';
    const blocks = sc.blocks || sc.lines || [];

    blocks.forEach(b => {
      const isSpeaker = b.speaker && b.speaker !== '—';
      const t = !isSpeaker ? (b.type === 'narration' ? 'narration' : detectType(b.speaker))
        : b.speaker.includes('心の声') ? 'thought' : 'dialogue';
      const text = Array.isArray(b.text) ? b.text.join('\n') : (b.text||'');
      result.push({ type:t, imageId:img, chapterId:cid, speaker:b.speaker||'', text, title, sceneId: curId });
    });

    if (sc.choices || sc.choice) {
      const choiceData = sc.choices || sc.choice?.options;
      const prompt = sc.choice?.question || sc.choice?.prompt || '';
      const opts = (choiceData || []).map(o => ({
        label: o.label || o.text,
        score: o.score || {},
        inlineNextId: o.next,
        afterLines: o.after_lines || []
      }));
      result.push({ type:'choice', imageId:img, chapterId:cid, speaker:'', text:prompt, title, choices:opts,
        ch1SceneMap: sceneMap, ch4SceneMap: sceneMap, ch5SceneMap: sceneMap, sceneId: curId });
      break;
    }

    curId = sc.next || null;
  }
  return result;
}

function handleTap() {
  if (waitingChoice || waitingName || waitingJoin) return;

// ═══════════════════════════════════════════
// TYPEWRITER
// ═══════════════════════════════════════════
let twTimer = null;
let twFullText = '';
let twCurrentIdx = 0;
let twDone = false;

function showTypewriter(text) {
  const wrap = document.getElementById('typewriter-wrap');
  const el = document.getElementById('typewriter-text');
  const hint = document.getElementById('typewriter-hint');

  twFullText = text;
  twCurrentIdx = 0;
  twDone = false;
  el.textContent = '';
  hint.classList.remove('show');
  wrap.classList.add('show');

  if (twTimer) clearInterval(twTimer);
  twTimer = setInterval(() => {
    if (twCurrentIdx < twFullText.length) {
      el.textContent += twFullText[twCurrentIdx];
      twCurrentIdx++;
    } else {
      clearInterval(twTimer);
      twDone = true;
      setTimeout(() => hint.classList.add('show'), 400);
    }
  }, 38); // 1文字あたりの速度（ms）
}

function skipOrNextTypewriter() {
  if (!twDone) {
    // まだ途中→一気に全文表示
    clearInterval(twTimer);
    document.getElementById('typewriter-text').textContent = twFullText;
    twDone = true;
    setTimeout(() => document.getElementById('typewriter-hint').classList.add('show'), 200);
    return;
  }
  // 完了後タップ→次のstepへ
  document.getElementById('typewriter-wrap').classList.remove('show');
  document.getElementById('typewriter-hint').classList.remove('show');
  stepIdx++;
  saveProgress();
  showStep();
}

// ═══════════════════════════════════════════
// NAME INPUT
// ═══════════════════════════════════════════
function showNameInput() {
  waitingName = true;
  document.getElementById('name-input-overlay').classList.add('show');
  document.getElementById('name-input').focus();
}

function submitName() {
  const val = document.getElementById('name-input').value.trim();
  playerName = val || 'あなた';
  document.getElementById('name-input-overlay').classList.remove('show');
  waitingName = false;
  stepIdx++;
  saveProgress();
  showStep();
}

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitName();
});

// ═══════════════════════════════════════════
// JOIN BANNER
// ═══════════════════════════════════════════
function showJoinBanner(key) {
  waitingJoin = true;
  const d = JOIN_DATA[key] || { icon:'✨', name:key, sub:'' };
  const banner = document.getElementById('join-banner');
  document.getElementById('j-icon').textContent = d.icon;
  document.getElementById('j-name').textContent = d.name;
  document.getElementById('j-sub').textContent = d.sub;
  banner.dataset.joinKey = key; // dismissJoinで参照するため保存
  banner.classList.add('show');
}

function dismissJoin() {
  const banner = document.getElementById('join-banner');
  banner.classList.remove('show');
  waitingJoin = false;
  stepIdx++;
  saveProgress();
  showStep();
}

// ═══════════════════════════════════════════
// IMAGE
// ═══════════════════════════════════════════
function setImage(imgId, title) {
  $stitle.textContent = title || '';
  $phTxt.textContent = title || '';
  if (!imgId) { $imgWrap.classList.add('no-img'); return; }
  $imgWrap.classList.add('no-img'); // show placeholder until loaded
  $img.src = imgId;
}
function imgErr() { $imgWrap.classList.add('no-img'); }
function imgOk()  { $imgWrap.classList.remove('no-img'); }

// ═══════════════════════════════════════════
// BADGES / DOTS
// ═══════════════════════════════════════════
function updateBadge(cid) {
  $badge.textContent = CHAPTER_LABELS[cid] || '';
}

function updateScoreDots() {
  ['light','moon','fire','deep'].forEach(t => {
    document.getElementById(`d-${t}`).classList.toggle('on', scores[t] > 0);
  });
}

// ═══════════════════════════════════════════
// RESULT SCREEN
// ═══════════════════════════════════════════
function getWinner() {
  let max = -1, winner = lastScore || 'light';
  for (const [t,v] of Object.entries(scores)) {
    if (v > max) { max = v; winner = t; }
    else if (v === max && lastScore === t) winner = t;
  }
  return winner;
}

function showResultScreen() {
  fadeTransition(() => {
    document.getElementById('game-screen').classList.remove('active');
    const $rs = document.getElementById('result-screen');
    $rs.classList.add('active');
    playBGM('ending');

    const winner = getWinner();
    const typeInfo = SCORE_TYPES[winner];
    const endData = ENDING_DATA.resultScreen;

    const typeResult = endData.types.find(t => ENDING_SCORE_MAP[t.typeId] === winner);

    document.getElementById('rs-icon').textContent = typeInfo.icon;
    document.getElementById('rs-typename').textContent = typeResult ? typeResult.title : typeInfo.name;
    document.getElementById('rs-text').textContent = typeResult ? N(typeResult.text.join('\n')) : '';

    const $sc = document.getElementById('rs-scores');
    $sc.innerHTML = '';
    for (const [t,v] of Object.entries(scores)) {
      const p = document.createElement('div');
      p.className = 'rs-pill' + (t === winner ? ' win' : '');
      p.textContent = `${SCORE_TYPES[t].icon} ${v}pt`;
      $sc.appendChild(p);
    }

    const cr = endData.commonResult;
    document.getElementById('rs-ctitle').textContent = cr.resultName || cr.title;
    document.getElementById('rs-ctext').textContent = N(cr.text.join('\n'));
  });
}

function proceedToFin() {
  // resultScreenを閉じてgame-screenに戻り、FINシーンへ
  const $rs = document.getElementById('result-screen');
  $rs.classList.remove('active');
  document.getElementById('game-screen').classList.add('active');
  stepIdx++;
  showStep();
}

// ═══════════════════════════════════════════
// TRANSITION
// ═══════════════════════════════════════════
function fadeTransition(cb) {
  $ov.classList.add('on');
  setTimeout(() => { cb(); setTimeout(() => $ov.classList.remove('on'), 80); }, 420);
}

:"剣士","text":"……勝手なやつだな。"},{"speaker":"じょりぃ","text":"おたがいさまー！"},{"type":"narration","text":"影は薄れていき、剣士は剣を下ろした。"},{"speaker":"剣士","text":"俺は……守りたかっただけだ。"},{"speaker":"剣士","text":"あの時、守れなかった。だから強くならなきゃいけないと思った。"},{"speaker":"剣士","text":"誰にも頼らず、ひとりで全部背負えば、もう失わずに済むと思っていた。"}],"next":"1-8"},{"id":"1-7-4-moon","title":"剣士の本音","image":"1-7-4","lines":[{"type":"narration","text":"{{name}}は、すぐに問いかけなかった。"},{"type":"narration","text":"見えた過去に踏み込みすぎないように、少しだけ距離を置いて、やわらかい声で言う。"},{"speaker":"{{name}}","text":"今は、無理に話さなくていいです。"},{"speaker":"{{name}}","text":"でも……ここには、あなたを責める人はいません。"},{"speaker":"{{name}}","text":"泣けなかったことも、守れなかったと思っていることも、すぐに言葉にしなくて大丈夫です。"},{"speaker":"{{name}}","text":"ひとりで抱え続けなくていい。"},{"type":"narration","text":"剣士は目を伏せた。"},{"type":"narration","text":"しばらく沈黙したあと、低く口を開く。"},{"speaker":"剣士","text":"……俺は、守りたかっただけだ。"},{"speaker":"剣士","text":"守れなかった自分を、ずっと許せなかった。"},{"speaker":"剣士","text":"それなのに、頼ることを弱さだと思っていた。"}],"next":"1-8"},{"id":"1-7-4-fire","title":"剣士の本音","image":"1-7-4","lines":[{"type":"narration","text":"{{name}}は、剣士を見つめた。"},{"speaker":"{{name}}","text":"……守りたかったんですね。"},{"type":"narration","text":"その一言に、剣士の目が大きく揺れる。"},{"speaker":"{{name}}","text":"強くなりたかったんじゃなくて、本当は、もう誰も失いたくなかったんですね。"},{"type":"narration","text":"責められるでもなく、急かされるでもなく、ただ本当の気持ちに触れられたように、剣士は息を詰めた。"},{"speaker":"剣士","text":"……ああ。"},{"speaker":"剣士","text":"守りたかった。誰かを。"},{"speaker":"剣士","text":"もう二度と、失いたくなかった。"},{"type":"narration","text":"剣士は握っていた剣をわずかに下ろした。"},{"speaker":"剣士","text":"でも、守ろうとするほど……誰にも頼れなくなっていた。"},{"speaker":"じょりぃ","text":"強がるのって、疲れるもんね。"},{"speaker":"剣士","text":"……そうだな。疲れる。"}],"next":"1-8"},{"id":"1-7-4-deep","title":"剣士の本音","image":"1-7-4","lines":[{"type":"narration","text":"{{name}}は、影を見つめたあと、静かに剣士へ視線を戻した。"},{"speaker":"{{name}}","text":"その影も……あなたを守ろうとしていたのかもしれません。"},{"speaker":"剣士","text":"……何？"},{"speaker":"{{name}}","text":"誰にも頼るな。弱さを見せるな。ひとりでいろ。"},{"speaker":"{{name}}","text":"それは苦しい言葉だけど……きっと、もう二度と傷つかないように生まれた言葉なんです。"},{"speaker":"{{name}}","text":"もう二度と、大切なものを失わないように。"},{"type":"narration","text":"影が、かすかに揺れる。"},{"type":"narration","text":"まるで、その言葉を否定できないように。"},{"speaker":"剣士","text":"守る……？ こんなものが？"},{"speaker":"{{name}}","text":"たぶん、間違った守り方で。"},{"speaker":"{{name}}","text":"でも、それしか知らなかったんです。"},{"speaker":"{{name}}","text":"ひとりになることでしか、自分を守れないと思っていたのかもしれません。"},{"type":"narration","text":"長い沈黙のあと、剣士はゆっくり剣を下ろした。"},{"speaker":"剣士","text":"……俺は、守りたかっただけだ。"},{"speaker":"剣士","text":"失いたくなかった。"},{"speaker":"剣士","text":"だから、ひとりで強くならなきゃいけないと思っていた。"}],"next":"1-8"},{"id":"1-8","title":"剣士の名はイブキ","image":"1-8","lines":[{"type":"narration","text":"影は、完全に消えたわけではなかった。"},{"type":"narration","text":"けれど、さっきまでの黒い重さはなくなり、淡い霧のようにほどけて、森の中へ溶けていった。"},{"type":"narration","text":"剣士はしばらく無言で立っていた。そして、やがて{{name}}の方を見る。"},{"speaker":"剣士","text":"……助けられた。"},{"speaker":"剣士","text":"礼を言うのは、得意じゃない。だが……ありがとう。"},{"speaker":"{{name}}","text":"私は……ただ、放っておけなかっただけです。"},{"speaker":"じょりぃ","text":"あと、{{name}}もめちゃくちゃがんばってたからね！ わたしも！"},{"speaker":"剣士","text":"そこは自分で言うんだな。"},{"speaker":"じょりぃ","text":"言わないと伝わらないこともあるのですー！"},{"type":"narration","text":"少しだけ空気がやわらぐ。そのあと、剣士は静かに名乗った。"},{"speaker":"剣士","text":"……イブキだ。"},{"speaker":"{{name}}","text":"イブキさん……。"},{"speaker":"イブキ","text":"剣士をしている。誰かと組むのは、得意じゃない。"},{"speaker":"じょりぃ","text":"知ってるー。顔に書いてあるー。"},{"speaker":"イブキ","text":"……うるさい妖精だな。"},{"speaker":"じょりぃ","text":"ほめ言葉として受け取っておくね！"},{"speaker":"{{name}}","text":"私も、強いわけじゃありません。怖いし、迷うし、ひとりだったら、立ち止まっていたかもしれない。"},{"speaker":"{{name}}","text":"でも、じょりぃがいてくれたから進めました。だから……もしよければ、一緒に来ませんか。"},{"speaker":"イブキ","text":"俺は、誰かと歩くのは得意じゃない。"},{"speaker":"じょりぃ","text":"それ、さっき聞いたー。"},{"speaker":"じょりぃ","text":"でもね、得意じゃないことは、ちょっとずつでいいのですー！"},{"speaker":"イブキ","text":"だが、借りは返す。お前たちの旅……少しだけ付き合ってやる。"},{"speaker":"じょりぃ","text":"はい出たー！ “少しだけ”って言う人、最後までいるやつー！"},{"speaker":"イブキ","text":"……最後までは知らん。"},{"speaker":"{{name}}（心の声）","text":"ひとりで始まった旅に、仲間が増えた。"},{"speaker":"{{name}}（心の声）","text":"それだけで、こんなに心があたたかくなるなんて。"}],"next":"1-9"},{"id":"1-9","title":"光の地図に忘れられた神殿が灯る","image":"1-9","lines":[{"type":"narration","text":"そのとき――{{name}}の胸元で、淡い光が揺れた。"},{"type":"narration","text":"取り出したのは、旅立ちの時から持っていた光の地図。"},{"type":"narration","text":"白い紙のようだった地図の上に、ひとつ、新しい光が灯っていた。"},{"type":"narration","text":"光は、古い神殿のかたちを浮かび上がらせる。"},{"speaker":"{{name}}","text":"……新しい場所が。"},{"speaker":"じょりぃ","text":"次の光だね。"},{"type":"narration","text":"イブキが地図をのぞき込み、眉をひそめる。"},{"speaker":"イブキ","text":"神殿、か……。嫌な気配がする。"},{"speaker":"{{name}}（心の声）","text":"きっと、あそこにもまた、誰かの心に絡まった影がある。"},{"speaker":"{{name}}（心の声）","text":"でも――もう、ひとりじゃない。"},{"speaker":"{{name}}","text":"行きましょう。"},{"speaker":"じょりぃ","text":"おー！"},{"speaker":"イブキ","text":"……ああ。"},{"type":"narration","text":"光の地図は、三人の足元を淡く照らし、その先の道を示している。"},{"speaker":"{{name}}（心の声）","text":"影の中にいるのは、倒すべき敵だけじゃない。"},{"speaker":"{{name}}（心の声）","text":"傷ついて、置き去りになった心かもしれない。"},{"speaker":"{{name}}（心の声）","text":"だから私は、光を探しに行く。私の中にも、誰かの中にも眠る光を――取り戻すために。"},{"type":"narration","text":"三人は、光に導かれるように歩き出す。"},{"type":"narration","text":"第2章「忘れられた神殿と、言えなかった言葉」へ続く。"}],"next":"chapter_2"}],"imageSlots":["1-1","1-2","1-3","1-4","1-5-1","1-5-2","1-5-3","1-5-4","1-6-1","1-6-2","1-6-3","1-6-4","1-7-1","1-7-2","1-7-3","1-7-4","1-8","1-9"],"scoreSummary":{"choice_1":{"sceneId":"1-5","light":"すぐ助けに行く","moon":"まず影の動きを見る","fire":"剣士の痛みに意識を向ける","deep":"影が生まれた理由を感じる"},"choice_2":{"sceneId":"1-7-3","light":"一緒に戦います","moon":"今は無理に話さなくていい","fire":"守りたかったんですね","deep":"その影も、あなたを守ろうとしていたのかもしれない"}},"revision":{"version":"1.1","reason":"戦闘シーンに、{{name}}の光の盾、じょりぃのガード魔法、イブキの過去と影が生まれた理由を追加。第1章テーマ「一人で戦わなくてもいい」を強化。"}};

// ── CHAPTER 2 ──
const CH2_DATA = {

  scenes:[
    {id:"scene_1",title:"霧の森へ",image:"2-1.png",content:[
      {type:"narration",text:"第1章の戦いを終えたあと、じょりぃが広げた光の地図には、新しい道が浮かび上がっていた。"},
      {type:"narration",text:"その光をたどって進んだ先は、白い霧に包まれた、静かな森だった。"},
      {type:"narration",text:"木々の間を抜ける風は冷たく、どこか遠くで、誰かのため息のような音がした。"},
      {type:"thought",speaker:"name",text:"何かが、ここから始まる気がした。少し怖い。胸の奥がざわざわする。"},
      {type:"thought",speaker:"name",text:"でも――私は、もう一人じゃない。隣にはじょりぃがいて、前にはイブキがいる。だから進める。怖くても、一歩なら進める。"},
      {type:"dialogue",speaker:"じょりぃ",text:"この先だよ。忘れられた神殿……光の地図が、そう言ってる"},
      {type:"dialogue",speaker:"イブキ",text:"空気が妙だな。魔物の気配とも少し違う……"},
      {type:"dialogue",speaker:"name",text:"うん……。なんだろう、この感じ。胸の奥が、少し痛むような……"},
      {type:"dialogue",speaker:"じょりぃ",text:"ここにはね、言えなかった気持ちが残ってるみたい"},
      {type:"narration",text:"少し沈黙が落ちる。霧の向こうには、まだ見えない何かが待っていた。"}
    ]},
    {id:"scene_2",title:"神殿を前にして",image:"2-2.png",content:[
      {type:"narration",text:"森を抜けると、霧の向こうに古い神殿が見えた。白くかすんだ石造りの建物。長い間、人の足が遠のいていたような静けさがあった。"},
      {type:"dialogue",speaker:"イブキ",text:"……あれが神殿か"},
      {type:"dialogue",speaker:"じょりぃ",text:"うん。でも、ただの神殿じゃない。ここは「忘れられた言葉」が眠る場所"},
      {type:"thought",speaker:"name",text:"忘れられた言葉。そんなもの、私の中にもあるんだろうか。忘れたんじゃなくて、ただ奥にしまっただけの気持ちが。"}
    ],choices:[
      {id:"choice_2_1",text:"行こう。怖くても、止まりたくない",score:"light",point:1},
      {id:"choice_2_2",text:"気をつけて進もう。何か仕掛けがあるかもしれない",score:"moon",point:1},
      {id:"choice_2_3",text:"ここに残ってる誰かの気持ちを、放っておけない",score:"fire",point:1},
      {id:"choice_2_4",text:"この場所は、心の奥に触れてくる気がする……慎重にいこう",score:"deep",point:1}
    ],afterChoice:[
      {type:"dialogue",speaker:"イブキ",text:"よし。気を抜くなよ"},
      {type:"dialogue",speaker:"じょりぃ",text:"うん。きっと、この場所には意味があるよ"},
      {type:"narration",text:"一行は、霧の向こうの神殿へと足を進めた。"}
    ]},
    {id:"scene_3",title:"神殿の入口で聞こえた声",image:"2-3.png",content:[
      {type:"narration",text:"神殿の入口に近づくにつれ、霧はさらに濃くなっていく。崩れた柱、ひび割れた石畳。誰もいないはずなのに、かすかな声だけが聞こえた。"},
      {type:"dialogue",speaker:"？？？",text:"……私は、大丈夫です"},
      {type:"dialogue",speaker:"？？？",text:"平気です……"},
      {type:"dialogue",speaker:"？？？",text:"だから……心配しないで……"},
      {type:"thought",speaker:"name",text:"その声を聞いた瞬間、胸がきゅっと痛んだ。知らない声のはずなのに、どこかで聞いたことがある気がした。"},
      {type:"thought",speaker:"name",text:"それは、昔の自分の声に似ていた。本当は助けてほしかったのに。本当は怖かったのに。それでも笑って言った、「大丈夫」。"},
      {type:"dialogue",speaker:"イブキ",text:"誰かいるな"},
      {type:"dialogue",speaker:"じょりぃ",text:"うん……でも、この声。無理してる"},
      {type:"dialogue",speaker:"name",text:"行ってみよう"}
    ]},
    {id:"scene_4",title:"魔法使いとの出会い",image:"2-4.png",content:[
      {type:"narration",text:"霧の向こうから、ひとりの少女が現れた。長い杖を手にした、静かな雰囲気の魔法使いだった。"},
      {type:"dialogue",speaker:"魔法使い",text:"……ここへは近づかないほうがいいです"},

      {type:"thought",speaker:"name",text:"でも、じょりぃは言った。「この人の声、泣いてる」って。私は――ちゃんと聞けるヒーラーになれるだろうか。笑顔の奥にある、本当の声を。"},
      {type:"dialogue",speaker:"name",text:"あなたの名前を聞いてもいい？"},
      {type:"narration",text:"魔法使いは少しだけ迷ったあと、静かに答えた。"},
      {type:"dialogue",speaker:"魔法使い",text:"……コトハです。言葉の魔法を使っています"},
      {type:"dialogue",speaker:"じょりぃ",text:"コトハだね。この子はname。ヒーラーの道を進んでるんだよ"},
      {type:"dialogue",speaker:"じょりぃ",text:"そして僕はじょりぃ。nameを見守る、とっても頼れる妖精！"},
