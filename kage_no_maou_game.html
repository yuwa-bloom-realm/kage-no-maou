<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>影の魔王と、光を選ぶ朝</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Noto+Sans+JP:wght@300;400&display=swap');

:root {
  --gold: #C9A84C;
  --gold-l: #E8C97A;
  --pur-deep: #1A0A2E;
  --pur-mid: #2D1457;
  --pur-glow: #7B3FA0;
  --teal: #2DC4B2;
  --white: #F0EBF8;
  --shadow: 0 1px 8px rgba(0,0,0,0.9);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--pur-deep);
  font-family: 'Noto Serif JP', serif;
  color: var(--white);
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  user-select: none;
}

html {
  height: 100%;
}

/* ══ SCREENS ══ */
.screen { display:none; position:fixed; inset:0; z-index:50; width:100%; height:100%; }
.screen.active { display:flex; }

/* ── TITLE SCREEN ── */
#title-screen {
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 0;
  position: relative;
  overflow: hidden;
  background: #0a0014;
}

#title-bg-img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  opacity: 1;
  display: block;
}

/* 下部グラデーション */
#title-screen::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    linear-gradient(to bottom,
      transparent 45%,
      rgba(10,0,20,0.7) 70%,
      rgba(10,0,20,0.95) 100%
    );
  pointer-events: none;
}

#title-screen > * { position: relative; z-index: 1; }

/* ボタンエリア */
#title-btn-area {
  width: 100%;
  padding: 0 28px 52px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  align-items: center;
}

/* コピーライト */
#title-copyright {
  font-size: 10px;
  color: rgba(201,168,76,0.4);
  letter-spacing: 0.15em;
  font-family: 'Noto Sans JP', sans-serif;
  font-weight: 300;
  margin-bottom: 4px;
}

/* はじめからボタン（メイン・光るやつ） */
.ts-btn {
  width: 100%;
  max-width: 320px;
  background: linear-gradient(135deg, rgba(123,63,160,0.9) 0%, rgba(80,20,130,0.95) 100%);
  border: 1px solid rgba(201,168,76,0.6);
  border-radius: 4px;
  padding: 16px 0;
  color: var(--white);
  font-size: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: .38em;
  cursor: pointer;
  transition: all .28s;
  text-shadow: 0 0 12px rgba(201,168,76,0.5);
  box-shadow:
    0 0 20px rgba(123,63,160,0.4),
    inset 0 1px 0 rgba(255,255,255,0.1);
  position: relative;
  overflow: hidden;
}

.ts-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  transition: left 0.5s;
}

.ts-btn:hover::before, .ts-btn:active::before { left: 150%; }
.ts-btn:hover, .ts-btn:active {
  background: linear-gradient(135deg, rgba(150,80,200,0.95) 0%, rgba(100,30,160,1) 100%);
  border-color: var(--gold);
  box-shadow: 0 0 30px rgba(123,63,160,0.7), inset 0 1px 0 rgba(255,255,255,0.15);
}

/* つづきからボタン（サブ・落ち着いた） */
.ts-btn-sub {
  width: 100%;
  max-width: 320px;
  background: rgba(20,8,40,0.7);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 4px;
  padding: 14px 0;
  color: rgba(232,201,122,0.75);
  font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif;
  letter-spacing: .38em;
  cursor: pointer;
  transition: all .28s;
}

.ts-btn-sub:hover, .ts-btn-sub:active {
  background: rgba(45,20,80,0.8);
  border-color: rgba(201,168,76,0.6);
  color: var(--gold-l);
}

.ts-btn-sub.hidden { display: none; }

/* ── GAME SCREEN ── */
#game-screen {
  flex-direction: column;
  cursor: pointer;
}

/* image area */
#img-wrap {
  position:relative;
  flex:0 0 72%;
  overflow:hidden;
  background:var(--pur-deep);
}

#scene-img {
  width:100%; height:100%;
  object-fit:cover;
  object-position:center center;
  display:block;
  transition:opacity .5s;
}

#img-wrap::after {
  content:'';
  position:absolute;
  inset:0;
  background:
    linear-gradient(to bottom, transparent 35%, rgba(26,10,46,.88) 100%),
    linear-gradient(to right, rgba(26,10,46,.2) 0%, transparent 22%, transparent 78%, rgba(26,10,46,.2) 100%);
  pointer-events:none;
}

#img-wrap.no-img {
  background:
    radial-gradient(ellipse at 30% 55%, rgba(74,144,217,.2) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 30%, rgba(123,63,160,.3) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 85%, rgba(45,196,178,.12) 0%, transparent 45%),
    var(--pur-deep);
}

.ph-wrap {
  display:none;
  position:absolute; inset:0;
  align-items:center; justify-content:center;
  flex-direction:column; gap:10px;
  pointer-events:none;
}
#img-wrap.no-img .ph-wrap { display:flex; }
#img-wrap.no-img #scene-img { opacity:0; }
.ph-icon { font-size:34px; opacity:.28; }
.ph-text { font-size:11px; color:var(--gold); opacity:.3; letter-spacing:.2em; font-family:'Noto Sans JP',sans-serif; }

/* badges */
#chapter-badge {
  position:absolute; top:14px; left:16px;
  font-size:10px; color:var(--gold);
  letter-spacing:.2em; font-family:'Noto Sans JP',sans-serif;
  font-weight:300; opacity:.65; z-index:10;
}
#scene-title-lbl {
  position:absolute; top:16px; left:50%; transform:translateX(-50%);
  font-size:11px; letter-spacing:.22em; color:var(--gold-l);
  text-shadow:var(--shadow); font-family:'Noto Sans JP',sans-serif;
  font-weight:300; white-space:nowrap; z-index:10; opacity:.75;
}
#score-dots {
  position:absolute; top:14px; right:16px;
  display:flex; gap:6px; z-index:10;
}
.sdot {
  width:7px; height:7px; border-radius:50%;
  border:1px solid rgba(201,168,76,.35);
  transition:all .4s; background:transparent;
}
.sdot.light.on { background:#FFD700; border-color:#FFD700; box-shadow:0 0 6px #FFD700; }
.sdot.moon.on  { background:#C8D8F8; border-color:#C8D8F8; box-shadow:0 0 6px #C8D8F8; }
.sdot.fire.on  { background:#FF7755; border-color:#FF7755; box-shadow:0 0 6px #FF7755; }
.sdot.deep.on  { background:#BB88FF; border-color:#BB88FF; box-shadow:0 0 6px #BB88FF; }

/* text area */
#txt-area {
  flex:1;
  position:relative;
  background:linear-gradient(to bottom, rgba(26,10,46,.97) 0%, rgba(18,5,34,1) 100%);
  border-top:1px solid rgba(201,168,76,.18);
  display:flex; flex-direction:column;
  overflow:hidden; min-height:0;
}
#txt-area::before {
  content:'';
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:70px; height:1px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
}

#spk-name {
  font-size:11px; letter-spacing:.2em; color:var(--gold);
  font-family:'Noto Sans JP',sans-serif; font-weight:400;
  padding:11px 20px 3px; min-height:28px; flex-shrink:0;
}
#dlg-text {
  flex:1; padding:0 20px 40px;
  font-size:15px; line-height:1.9;
  color:var(--white); font-weight:300;
  overflow-y:auto; scrollbar-width:none; min-height:0;
  white-space:pre-wrap;
}
#dlg-text::-webkit-scrollbar { display:none; }
#dlg-text.narr { color:rgba(240,235,248,.72); font-style:italic; font-size:13.5px; letter-spacing:.03em; }
#dlg-text.thgt { color:rgba(210,190,255,.88); font-size:14px; font-style:italic; }
#dlg-text.sys  {
  color:var(--gold-l); font-family:'Noto Sans JP',sans-serif;
  font-size:13px; letter-spacing:.18em; text-align:center; padding-top:8px;
}
#dlg-text.chtr {
  color:var(--gold-l); font-family:'Noto Serif JP', serif;
  font-size:15px; font-weight:300; letter-spacing:.18em; text-align:center;
  line-height:2.2; padding-top:12px;
}

.fade-up { animation:fadeUp .45s ease forwards; }
@keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

#tap-hint {
  position:absolute; bottom:12px; right:18px;
  font-size:10px; color:var(--gold); letter-spacing:.15em;
  font-family:'Noto Sans JP',sans-serif;
  animation:blink 2.2s ease-in-out infinite; pointer-events:none;
}
@keyframes blink { 0%,100%{opacity:.3} 50%{opacity:.85} }

/* choice panel */
#choice-panel {
  display:none; flex-direction:column;
  gap:7px; padding:10px 14px 14px;
  overflow-y:auto; scrollbar-width:none;
  flex:1; min-height:0;
}
#choice-panel::-webkit-scrollbar { display:none; }
#choice-panel.show { display:flex; }
.choice-lbl {
  font-size:10px; letter-spacing:.25em; color:var(--gold);
  font-family:'Noto Sans JP',sans-serif; font-weight:300;
  opacity:.75; padding:0 4px 3px; flex-shrink:0;
}
.cbtn {
  background:linear-gradient(135deg, rgba(45,20,87,.75) 0%, rgba(26,10,46,.88) 100%);
  border:1px solid rgba(201,168,76,.28);
  border-radius:5px; padding:11px 14px;
  color:var(--white); font-size:13.5px;
  font-family:'Noto Serif JP',serif; font-weight:300;
  line-height:1.65; text-align:left;
  cursor:pointer; transition:all .22s;
  position:relative; flex-shrink:0;
}
.cbtn::before {
  content:''; position:absolute;
  left:0; top:0; bottom:0; width:3px;
  background:var(--gold); border-radius:5px 0 0 5px;
  opacity:0; transition:opacity .2s;
}
.cbtn:hover::before, .cbtn:active::before { opacity:1; }
.cbtn:hover, .cbtn:active {
  border-color:rgba(201,168,76,.65);
  background:linear-gradient(135deg, rgba(60,28,105,.9) 0%, rgba(38,14,65,.95) 100%);
  transform:translateX(3px);
}

/* name input overlay */
#name-input-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(20,6,40,.9); z-index:80;
  flex-direction:column; align-items:center; justify-content:center;
  gap:20px; padding:40px 28px;
}
#name-input-overlay.show { display:flex; }
.ni-label { font-size:11px; letter-spacing:.22em; color:var(--gold); font-family:'Noto Sans JP',sans-serif; }
#name-input {
  background:rgba(45,20,87,.5);
  border:1px solid rgba(201,168,76,.4);
  border-radius:4px; padding:12px 18px;
  color:var(--white); font-size:16px;
  font-family:'Noto Serif JP',serif; font-weight:300;
  text-align:center; width:100%; max-width:260px;
  outline:none; transition:border-color .2s;
}
#name-input:focus { border-color:var(--gold); }
#name-input::placeholder { color:rgba(240,235,248,.3); font-size:13px; }
.ni-btn {
  background:transparent;
  border:1px solid rgba(201,168,76,.45); border-radius:40px;
  padding:12px 38px; color:var(--gold-l);
  font-size:12.5px; font-family:'Noto Sans JP',sans-serif;
  letter-spacing:.28em; cursor:pointer; transition:all .28s;
}
.ni-btn:hover { background:rgba(201,168,76,.1); border-color:var(--gold); }

/* join banner */
#join-banner {
  display:none; position:fixed; inset:0;
  background:rgba(20,6,40,.85); z-index:80;
  align-items:center; justify-content:center;
}
#join-banner.show { display:flex; }
.jbox {
  background:linear-gradient(135deg, rgba(45,20,87,.95), rgba(26,10,46,.98));
  border:1px solid rgba(201,168,76,.4); border-radius:10px;
  padding:28px 36px; text-align:center;
  display:flex; flex-direction:column; gap:12px; align-items:center;
  max-width:280px;
}
.jicon { font-size:40px; }
.jtitle { font-size:10px; letter-spacing:.25em; color:var(--gold); font-family:'Noto Sans JP',sans-serif; }
.jname { font-size:22px; font-weight:700; }
.jsub { font-size:12px; color:rgba(240,235,248,.6); font-family:'Noto Sans JP',sans-serif; }
.jbtn {
  background:transparent; border:1px solid rgba(201,168,76,.4);
  border-radius:30px; padding:9px 28px;
  color:var(--gold-l); font-size:12px;
  font-family:'Noto Sans JP',sans-serif; letter-spacing:.2em;
  cursor:pointer; transition:all .2s;
}
.jbtn:hover { background:rgba(201,168,76,.1); }

/* ── RESULT SCREEN ── */
#result-screen {
  flex-direction:column; align-items:center; justify-content:center;
  gap:16px; padding:36px 28px; text-align:center;
  background:
    radial-gradient(ellipse at 50% 35%, rgba(123,63,160,.5) 0%, transparent 58%),
    var(--pur-deep);
  overflow-y:auto; scrollbar-width:none;
}
#result-screen::-webkit-scrollbar { display:none; }

.rs-eyebrow { font-family:'Noto Sans JP',sans-serif; font-size:10px; letter-spacing:.3em; color:var(--gold); opacity:.7; }
.rs-icon { font-size:50px; }
.rs-typename { font-size:24px; font-weight:700; line-height:1.45; text-shadow:0 0 30px rgba(123,63,160,.9); }
.rs-div { width:50px; height:1px; background:linear-gradient(to right,transparent,var(--gold),transparent); }
.rs-text { font-size:13px; color:rgba(240,235,248,.7); font-family:'Noto Sans JP',sans-serif; font-weight:300; line-height:1.9; max-width:300px; white-space:pre-wrap; }
.rs-scores { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:4px 0; }
.rs-pill {
  background:rgba(45,20,87,.55); border:1px solid rgba(201,168,76,.22);
  border-radius:20px; padding:5px 14px;
  font-size:11px; font-family:'Noto Sans JP',sans-serif;
  color:rgba(240,235,248,.65);
}
.rs-pill.win { border-color:var(--gold); color:var(--gold-l); background:rgba(65,30,110,.75); }

.rs-common-title { font-size:16px; font-weight:700; color:var(--gold-l); margin-top:8px; }
.rs-common-text { font-size:13px; color:rgba(240,235,248,.75); font-family:'Noto Sans JP',sans-serif; font-weight:300; line-height:1.9; max-width:300px; white-space:pre-wrap; }

.rs-btn {
  background:transparent; border:1px solid rgba(201,168,76,.45);
  border-radius:40px; padding:12px 36px; color:var(--gold-l);
  font-size:12.5px; font-family:'Noto Sans JP',sans-serif;
  letter-spacing:.22em; cursor:pointer; transition:all .28s; margin-top:8px;
}
.rs-btn:hover { background:rgba(201,168,76,.1); border-color:var(--gold); }

/* mute button */
#mute-btn {
  position:fixed; bottom:18px; left:18px;
  width:36px; height:36px; border-radius:50%;
  background:rgba(26,10,46,0.75);
  border:1px solid rgba(201,168,76,0.35);
  color:var(--gold-l); font-size:15px;
  cursor:pointer; z-index:60;
  display:flex; align-items:center; justify-content:center;
  transition:all .25s;
  backdrop-filter:blur(4px);
}
#mute-btn:hover { border-color:var(--gold); background:rgba(45,20,87,0.85); }

/* transition */
#ov {
  position:fixed; inset:0; background:var(--pur-deep);
  z-index:100; pointer-events:none; opacity:0; transition:opacity .45s;
}
#ov.on { opacity:1; pointer-events:all; }
</style>
</head>
<body>

<div id="ov"></div>

<!-- TITLE SCREEN -->
<div id="title-screen" class="screen active">
  <img id="title-bg-img" src="title-bg.png" alt="" onerror="this.style.display='none'">
  <div id="title-btn-area">
    <div id="title-copyright">© yuwa Bloom Realm</div>
    <button class="ts-btn" onclick="startTitle()">は じ め か ら</button>
    <button class="ts-btn-sub hidden" id="continue-btn" onclick="continueGame()">つ づ き か ら</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div id="img-wrap" class="no-img">
    <img id="scene-img" src="" alt="" onerror="document.getElementById('img-wrap').classList.add('no-img')" onload="document.getElementById('img-wrap').classList.remove('no-img')">
    <div class="ph-wrap">
      <div class="ph-icon">🌫</div>
      <div class="ph-text" id="ph-txt"></div>
    </div>
    <div id="chapter-badge"></div>
    <div id="scene-title-lbl"></div>
    <div id="score-dots">
      <div class="sdot light" id="d-light"></div>
      <div class="sdot moon"  id="d-moon"></div>
      <div class="sdot fire"  id="d-fire"></div>
      <div class="sdot deep"  id="d-deep"></div>
    </div>
  </div>
  <div id="txt-area" onclick="handleTap()">
    <div id="spk-name"></div>
    <div id="dlg-text"></div>
    <div id="tap-hint">▼ タップして進む</div>
    <div id="choice-panel">
      <div class="choice-lbl">— どう声をかける？ —</div>
    </div>
  </div>
</div>

<!-- NAME INPUT OVERLAY -->
<div id="name-input-overlay">
  <div class="ni-label">あなたの名前を教えて</div>
  <input id="name-input" type="text" maxlength="10" placeholder="ゆわ" autocomplete="off">
  <button class="ni-btn" onclick="submitName()">決定</button>
</div>

<!-- JOIN BANNER -->
<div id="join-banner">
  <div class="jbox">
    <div class="jicon" id="j-icon">✨</div>
    <div class="jtitle">新たな仲間</div>
    <div class="jname" id="j-name"></div>
    <div class="jsub" id="j-sub"></div>
    <button class="jbtn" onclick="dismissJoin()">仲間にする</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen" class="screen">
  <div class="rs-eyebrow">あなたの旅のしるし</div>
  <div class="rs-icon" id="rs-icon"></div>
  <div class="rs-typename" id="rs-typename"></div>
  <div class="rs-div"></div>
  <div class="rs-text" id="rs-text"></div>
  <div class="rs-scores" id="rs-scores"></div>
  <div class="rs-div"></div>
  <div class="rs-common-title" id="rs-ctitle"></div>
  <div class="rs-common-text" id="rs-ctext"></div>
  <button class="rs-btn" onclick="location.reload()">も う 一 度</button>
</div>

<!-- MUTE BUTTON -->
<button id="mute-btn" onclick="toggleMute()">🔊</button>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const SCORE_TYPES = {
  light: { name:"光の先導者",  icon:"☀️",  typeId:"ibuki",  resultTitle:"一人で戦ってきた光" },
  moon:  { name:"静寂の観察者", icon:"🌙",  typeId:"kotoha", resultTitle:"心の声を取り戻す光" },
  fire:  { name:"炎の共感者",  icon:"🔥",  typeId:"mamoru", resultTitle:"守り続けたやさしさの灯り" },
  deep:  { name:"深淵の癒し手", icon:"💜",  typeId:"lumina", resultTitle:"ただいまと言える星灯り" }
};

// スコアキー（エンディングのendingScoreKeysとの対応）
const ENDING_SCORE_MAP = {
  ibuki:"light", kotoha:"moon", mamoru:"fire", lumina:"deep"
};

// JOIN BANNERS
const JOIN_DATA = {
  "コトハ加入": { icon:"🪄", name:"コトハ", sub:"言葉の魔法使い" },
  "マモル加入": { icon:"🛡", name:"マモル", sub:"守りの戦士" }
};

// ═══════════════════════════════════════════
// BGM ENGINE
// ═══════════════════════════════════════════
const BGM = {
  title:   'BGM_05_ending_Frozen_Fjord.mp3',  // タイトル〜プロローグ（ending曲を流用）
  field:   'BGM_02_forest_Nocturnal_Bloom.mp3', // 第1章
  healing: 'BGM_03_healing_Mystic_Tides.mp3',   // 第2章
  explore: 'BGM_04_explore_Dual_Illusions.mp3', // 第3章
  lumina:  'BGM_08_lumina_Forest_Sage.mp3',     // 第4章
  tower:   'BGM_09_maou_tower_Foreboding.mp3',  // 第5章
  battle:  'BGM_06_battle_Sword_Flash.mp3',     // 通常戦闘
  boss:    'BGM_07_boss_EpicBattle_Deity.mp3',  // ボス戦
  ending:  'BGM_05_ending_Frozen_Fjord.mp3',    // エンディング（同じ曲で回収）
  fin:     'BGM_10_fin_Moonlit_Overture.mp3'    // FIN余韻用（任意）
};

// ループしない曲（曲が終わったら最初から再生）
const BGM_NO_LOOP = new Set(['title', 'ending', 'fin']);

// 章ごとのBGM
const SCENE_BGM_MAP = {
  prologue: 'title',
  chapter1: 'field',
  chapter2: 'healing',
  chapter3: 'explore',
  chapter4: 'lumina',
  chapter5: 'tower',
  ending:   'ending'
};

// 戦闘シーン（戦闘終了後は章のBGMに戻る）

]);

const ENDING_SCENES = new Set([
  'ending-01','ending-02','ending-03',

]);

const HEALING_SCENES = new Set([

]);

let bgmAudio = null;
let currentBGMKey = null;
let isMuted = false;
let bgmSupported = true;
const BGM_VOLUME = 0.3; // 小さめ（文章の邪魔にならない程度）

function playBGM(key) {
  if (!bgmSupported || isMuted) return;
  if (key === currentBGMKey) return;
  const file = BGM[key];
  if (!file) return;
  try {
    if (bgmAudio && !bgmAudio.paused) {
      fadeBGM(bgmAudio, () => switchBGM(key, file));
    } else {
      switchBGM(key, file);
    }
  } catch(e) { bgmSupported = false; }
}

function switchBGM(key, file) {
  try {
    if (bgmAudio) { bgmAudio.pause(); bgmAudio = null; }
    currentBGMKey = key;
    const audio = new Audio(file);
    // ループしない曲は ended で最初から再生
    if (BGM_NO_LOOP.has(key)) {
      audio.loop = false;
      audio.addEventListener('ended', () => {
        try { audio.currentTime = 0; audio.play().catch(()=>{}); } catch(e) {}
      });
    } else {
      audio.loop = true;
    }
    audio.volume = 0;
    bgmAudio = audio;
    const p = audio.play();
    if (p && p.catch) p.catch(() => {});
    fadeInBGM(audio, BGM_VOLUME);
  } catch(e) { bgmSupported = false; }
}

function fadeBGM(audio, cb) {
  try {
    const step = 0.03;
    const iv = setInterval(() => {
      try {
        if (audio.volume > step) { audio.volume -= step; }
        else { audio.volume = 0; audio.pause(); clearInterval(iv); if (cb) cb(); }
      } catch(e) { clearInterval(iv); if (cb) cb(); }
    }, 40);
  } catch(e) { if (cb) cb(); }
}

function fadeInBGM(audio, targetVol) {
  try {
    const step = 0.02;
    const iv = setInterval(() => {
      try {
        if (audio.volume < targetVol - step) { audio.volume += step; }
        else { audio.volume = targetVol; clearInterval(iv); }
      } catch(e) { clearInterval(iv); }
    }, 40);
  } catch(e) {}
}

function toggleMute() {
  try {
    isMuted = !isMuted;
    document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🔊';
    if (isMuted) {
      if (bgmAudio) fadeBGM(bgmAudio, () => {});
    } else {
      if (currentBGMKey) {
        const key = currentBGMKey;
        currentBGMKey = null;
        playBGM(key);
      }
    }
  } catch(e) {}
}

function getBGMKeyForStep(step) {
  const sid = step.sceneId || step.id || '';
  const cid = step.chapterId || '';

  // FIN画面（5-20 最初のステップ）→ Moonlit_Overture
  if (step.isFin || FIN_SCENES.has(sid)) return 'fin';

  // エンディングシーン（5-17〜5-19）→ ending継続
  if (ENDING_SCENES.has(sid)) return 'ending';

  // 浄化・感動シーン（第5章）
  if (HEALING_SCENES.has(sid)) return 'healing';

  // ボス戦
  if (BOSS_SCENES.has(sid)) return 'boss';

  // 通常戦闘
  if (BATTLE_SCENES.has(sid)) return 'battle';

  // 戦闘終了→章BGMに戻る
  if (BATTLE_END_SCENES.has(sid)) return SCENE_BGM_MAP[cid] || 'field';

  // 章ベースのデフォルト
  return SCENE_BGM_MAP[cid] || 'field';
}

function updateBGMForStep(step) {
  const key = getBGMKeyForStep(step);
  playBGM(key);
}

const SAVE_KEY = 'kage_maou_save';

// まずlocalStorageが使えるか安全に確認
const SafeStorage = (function() {
  let _ls = null;
  let _mem = {}; // フォールバック用メモリストレージ

  // 使用可能チェック（一度だけ）
  try {
    const test = '__test__';
    window.localStorage.setItem(test, '1');
    window.localStorage.removeItem(test);
    _ls = window.localStorage;
  } catch(e) {
    _ls = null; // 使えない環境はメモリで代替
  }

  return {
    get(key) {
      try {
        if (_ls) return _ls.getItem(key);
        return _mem[key] || null;
      } catch(e) { return _mem[key] || null; }
    },
    set(key, val) {
      try {
        if (_ls) _ls.setItem(key, val);
        else _mem[key] = val;
      } catch(e) { _mem[key] = val; }
    },
    remove(key) {
      try {
        if (_ls) _ls.removeItem(key);
        delete _mem[key];
      } catch(e) { delete _mem[key]; }
    }
  };
})();

function saveProgress() {

// ── HELPERS ──
function pushStep(obj) { steps.push(obj); }

function pushLines(lines, imageId, chapterId, titleHint) {
  // lines: array of {type/speaker, text, ...}
  (lines || []).forEach(line => {
    const t = line.type || detectType(line.speaker);
    const text = Array.isArray(line.text) ? line.text.join('\n') : (line.text || '');
    pushStep({
      type: t, imageId, chapterId,
      speaker: line.speaker || '',
      text, title: titleHint || ''
    });
  });
}

function detectType(speaker) {
  if (!speaker || speaker === 'narration' || speaker === '—' || speaker === 'narr') return 'narration';
  if (speaker && speaker.includes('心の声')) return 'thought';
  return 'dialogue';
}

function pushBlocks(blocks, imageId, chapterId, titleHint) {
  // blocks: {speaker, text} where speaker "—" = narration
  (blocks || []).forEach(b => {
    const isSpeaker = b.speaker && b.speaker !== '—';
    const t = !isSpeaker ? 'narration'
      : b.speaker.includes('心の声') ? 'thought'
      : 'dialogue';
    const text = Array.isArray(b.text) ? b.text.join('\n') : (b.text || '');
    pushStep({ type:t, imageId, chapterId, speaker:b.speaker||'', text, title:titleHint||'' });
  });
}

function pushChoice(prompt, options, imageId, chapterId, titleHint) {
  pushStep({
    type:'choice', imageId, chapterId,
    speaker:'', text: prompt || 'どうする？',
    title: titleHint || '',
    choices: options
  });
}

function pushSystem(text, imageId, chapterId) {
  pushStep({ type:'system', imageId, chapterId, speaker:'', text });
}

function pushChapterTransition(lines, imageId, chapterId) {
  const text = Array.isArray(lines) ? lines.join('\n') : lines;
  pushStep({ type:'chapterTransition', imageId, chapterId, speaker:'', text });
}

// img helper
function resolveImg(id, chapterId) {
  if (!id) return '';
  // Already has extension
  if (id.includes('.')) return id;
  // prologue: p-0 → p-0.png
  if (id.startsWith('p-')) return `${id}.png`;
  // ending: 5-17 etc
  if (/^\d+-\d+$/.test(id) && parseInt(id) >= 5) return `${id}.png`;
  return `${id}.png`;
}

// PROLOGUE BUILDER
// ═══════════════════════════════════════════
function buildPrologue() {
  const cid = 'prologue';
  const scenes = PROLOGUE_DATA.scenes;
  const sceneMap = {};
  scenes.forEach(s => sceneMap[s.id] = s);

  const visited = new Set();
  let curId = scenes[0].id;

  while (curId && curId !== 'chapter1' && !visited.has(curId)) {
    visited.add(curId);
    const sc = sceneMap[curId];
    if (!sc) break;

    const img = sc.imageId && sc.imageId.includes('.png') ? sc.imageId : resolveImg(sc.imageId, cid);

    // narrationBlock / dialogueBlock → pages配列を1タップずつに展開
    if (sc.type === 'narrationBlock' || sc.type === 'dialogueBlock') {
      const spk = sc.speaker || '';
      (sc.pages || []).forEach(page => {
        // pageは文字列配列。「\n」や「speaker\ntext」形式を処理
        const lines = Array.isArray(page) ? page : [page];
        // speakerとtextを分離（"じょりぃ\nテキスト" 形式対応）
        let speaker = spk;
        let textLines = lines;

        if (lines.length > 0 && lines[0].includes('\n')) {
          const parts = lines[0].split('\n');
          speaker = parts[0];
          textLines = [parts.slice(1).join('\n'), ...lines.slice(1)];
        } else if (lines.length >= 2 && !lines[0].includes('。') && !lines[0].includes('……') && !lines[0].includes('——') && lines[0].length <= 12) {
          // 短い行がspeakerの可能性（「じょりぃ」「{{name}}」など）
          const possibleSpeaker = lines[0];
          if (['じょりぃ','イブキ','コトハ','マモル','おじいちゃん'].some(s => possibleSpeaker.includes(s)) || possibleSpeaker.includes('{{name}}')) {
            speaker = possibleSpeaker;
            textLines = lines.slice(1);
          }
        }

        // 心の声判定
        const isThought = speaker.includes('心の声') || speaker.includes('（心の声）');
        const isNarr = sc.type === 'narrationBlock' && !speaker;
        const type = isThought ? 'thought' : isNarr ? 'narration' : 'dialogue';
        const text = textLines.join('\n');
        pushStep({ type, imageId:img, chapterId:cid, speaker:N(speaker), text:N(text), title:'' });
      });

      // endCard（章タイトルカード）
      if (sc.endCard) {
        pushStep({ type:'chapterTransition', imageId:img, chapterId:cid, speaker:'',
          text:`${sc.endCard.title}\n${sc.endCard.subtitle}`, title:'' });
      }

    } else if (sc.type === 'nameInput') {
      const text = Array.isArray(sc.text) ? sc.text.join('\n') : sc.text;
      pushStep({ type:'nameInput', imageId:img, chapterId:cid, speaker:sc.speaker||'', text:N(text), title:'' });

    } else if (sc.type === 'choice') {
      const text = Array.isArray(sc.text) ? sc.text.join('\n') : sc.text;
      const opts = (sc.choices || []).map(c => ({
        label: c.label,
        score: c.effects || {},
        inlineNextId: c.next,
        afterLines: []
      }));
      pushStep({ type:'choice', imageId:img, chapterId:cid, speaker:sc.speaker||'', text:N(text), title:'', choices:opts, prologueSceneMap:sceneMap });
    }

    curId = sc.next || null;
  }
}

      }));
      pushStep({ type:'choice', imageId:img, chapterId:cid, speaker:'', text:sc.choice?.question||'', title, choices:opts });
    }

    curId = sc.next || null;

// ENDING BUILDER
// ═══════════════════════════════════════════
function buildEnding() {
  const cid = 'ending';
  const data = ENDING_DATA;

  data.scenes.forEach(sc => {
    const img = resolveImg(sc.image, cid);
    const title = sc.title || '';
    pushLines(sc.lines, img, cid, title);
  });

  // result screen step
  pushStep({ type:'resultScreen', imageId:'', chapterId:cid, speaker:'', text:'', title:'' });

  // fin scene（5-20 Fin画面 → BGM切り替えフラグ付き）
  if (data.finScene) {
    const img = resolveImg(data.finScene.image, cid);
    const finLines = data.finScene.lines || [];
    // 最初のstepにisFin:trueをつけてBGM切り替えトリガーにする
    finLines.forEach((l, idx) => {
      const t = l.type || detectType(l.speaker);
      const text = Array.isArray(l.text) ? l.text.join('\n') : (l.text||'');
      pushStep({ type:t, imageId:img, chapterId:cid, speaker:l.speaker||'', text, title:data.finScene.title||'Fin', isFin: idx === 0 });
    });
  }
}

// ═══════════════════════════════════════════
// STEP DISPLAY ENGINE
// ═══════════════════════════════════════════
function showStep() {
  if (stepIdx >= steps.length) { showResultScreen(); return; }
  const step = steps[stepIdx];

  updateBadge(step.chapterId);
  updateScoreDots();
  updateBGMForStep(step);

  const type = step.type;

  if (type === 'resultScreen') { showResultScreen(); return; }

  if (type === 'nameInput') {
    setImage(step.imageId, step.title);
    showNameInput();
    return;
  }

  if (type === 'joinBanner') {
    showJoinBanner(step.joinKey);
    return;
  }

  if (type === 'choice') {
    setImage(step.imageId, step.title);
    showChoiceStep(step);
    return;
  }

  if (type === 'chapterTransition') {
    setImage(step.imageId, step.title);
    const parts = N(step.text).split('\n');
    const chNum = parts[0] || '';
    const chSub = parts.slice(1).join('');
    $spk.textContent = '';
    $txt.className = 'chtr fade-up';
    $txt.innerHTML = `<span style="font-size:11px;letter-spacing:.38em;color:var(--gold);opacity:.85;font-family:'Noto Sans JP',sans-serif;">${chNum}</span>`
      + (chSub ? `<br><span style="display:block;width:44px;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:12px auto 10px;"></span><span style="font-size:14px;letter-spacing:.15em;">${chSub}</span>` : '');
    $txt.style.display = '';
    $tapHint.style.display = '';
    return;
  }

  if (type === 'system') {
    setImage(step.imageId, step.title);
    const key = step.text;
    if (key && JOIN_DATA[key]) { showJoinBanner(key); return; }
    showDialogue('sys', '', N(step.text || ''));
    return;
  }

  // narration / thought / dialogue
  setImage(step.imageId, step.title);

  if (type === 'narration') {
    showDialogue('narr', '', N(step.text));
  } else if (type === 'thought') {
    const spk = step.speaker ? `◇ ${N(step.speaker)}` : '';
    showDialogue('thgt', spk, N(step.text));
  } else {
    showDialogue('', N(step.speaker) || '', N(step.text));
  }
}

function showDialogue(cls, speaker, text) {
  hideChoices();
  $spk.textContent = speaker;
  $txt.className = cls ? `${cls} fade-up` : 'fade-up';
  $txt.textContent = text;
  $txt.style.display = '';
  $tapHint.style.display = '';
}

function hideChoices() {
  $choices.innerHTML = '<div class="choice-lbl">— どう声をかける？ —</div>';
  $choices.classList.remove('show');
}

// ═══════════════════════════════════════════
// CHOICE DISPLAY
// ═══════════════════════════════════════════
function showChoiceStep(step) {
  waitingChoice = true;
  $spk.textContent = '';
  $txt.style.display = 'none';
  $tapHint.style.display = 'none';

  $choices.innerHTML = '<div class="choice-lbl">— どう声をかける？ —</div>';
  (step.choices || []).forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cbtn';
    btn.textContent = N(c.label);
    btn.onclick = e => { e.stopPropagation(); selectChoice(step, c); };
    $choices.appendChild(btn);
  });
  $choices.classList.add('show');
}

function selectChoice(step, choice) {
  waitingChoice = false;
  hideChoices();
  $txt.style.display = '';
  $tapHint.style.display = '';

  // score
  const sc = choice.score || {};
  for (const [k,v] of Object.entries(sc)) {
    if (scores[k] !== undefined) {
      scores[k] += (v || 1);
      lastScore = k;
    }
  }
  updateScoreDots();

  // Build inline steps to inject
  const inject = [];
  const cid = step.chapterId;

  // Chapter 1 / 3 style: afterLines + merge to next
  if (choice.afterLines && choice.afterLines.length) {
    const img = choice.afterImg || step.imageId;
    choice.afterLines.forEach(l => {
      const t = l.type || detectType(l.speaker);
      const text = Array.isArray(l.text) ? l.text.join('\n') : (l.text||'');
      inject.push({ type:t, imageId:img, chapterId:cid, speaker:l.speaker||'', text, title:'' });
    });
  }

  // Chapter 2 style: choiceResponses afterLines + mergeLines (afterChoice)
  if (choice.mergeLines && choice.mergeLines.length) {
    const img = choice.mergeImg || step.imageId;
    choice.mergeLines.forEach(l => {
      const t = l.type || detectType(l.speaker);
      const text = Array.isArray(l.text) ? l.text.join('\n') : (l.text||'');
      inject.push({ type:t, imageId:img, chapterId:cid, speaker:l.speaker||'', text, title:'' });
    });
  }

  // Prologue style: choiceMap
  if (step.choiceMap && step.choiceMap[choice.label]) {
    step.choiceMap[choice.label].forEach(s => inject.push(s));
  }

  // Prologue pages形式: prologueSceneMap
  if (choice.inlineNextId && step.prologueSceneMap) {
    const branchSteps = collectPrologueBranch(choice.inlineNextId, step.prologueSceneMap, cid);
    branchSteps.forEach(s => inject.push(s));
  // Chapter 4/5 style: inlineNextId (jump to scene and continue)
  } else if (choice.inlineNextId) {
    const sceneMap = step.ch4SceneMap || step.ch5SceneMap;
    if (sceneMap) {
      const branchSteps = collectBranchSteps(choice.inlineNextId, sceneMap, cid);
      branchSteps.forEach(s => inject.push(s));
    }
  }

  // inject steps after current
  if (inject.length) {
    steps.splice(stepIdx + 1, 0, ...inject);
  }

  stepIdx++;
  saveProgress();
  showStep();
}

function collectPrologueBranch(startId, sceneMap, cid) {
  const result = [];
  const visited = new Set();
  let curId = startId;
  const MERGE = 'prologue-p12'; // 合流点

  while (curId && curId !== MERGE && curId !== 'chapter1' && !visited.has(curId)) {
    visited.add(curId);
    const sc = sceneMap[curId];
    if (!sc) break;

    const img = sc.imageId && sc.imageId.includes('.png') ? sc.imageId : resolveImg(sc.imageId, cid);
    const spk = sc.speaker || '';

    (sc.pages || []).forEach(page => {
      const lines = Array.isArray(page) ? page : [page];
      let speaker = spk;
      let textLines = lines;

      if (lines.length > 0 && lines[0].includes('\n')) {
        const parts = lines[0].split('\n');
        speaker = parts[0];
        textLines = [parts.slice(1).join('\n'), ...lines.slice(1)];
      } else if (lines.length >= 2) {
        const possibleSpeaker = lines[0];
        if (['じょりぃ','イブキ','コトハ','マモル','おじいちゃん'].some(s => possibleSpeaker.includes(s)) || possibleSpeaker.includes('{{name}}')) {
          speaker = possibleSpeaker;
          textLines = lines.slice(1);
        }
      }

      const isThought = speaker.includes('心の声') || speaker.includes('（心の声）');
      const type = isThought ? 'thought' : (speaker ? 'dialogue' : 'narration');
      result.push({ type, imageId:img, chapterId:cid, speaker:N(speaker), text:N(textLines.join('\n')), title:'' });
    });

    curId = sc.next || null;
  }
  return result;
}

function collectBranchSteps(startId, sceneMap, cid) {
  const result = [];
  const visited = new Set();
  let curId = startId;

  while (curId && !visited.has(curId)) {
    visited.add(curId);
    const sc = sceneMap[curId];
    if (!sc) break;

    const img = resolveImg(sc.image || sc.imageId, cid);
    const title = sc.title || '';
    const blocks = sc.blocks || sc.lines || [];

    blocks.forEach(b => {
      const isSpeaker = b.speaker && b.speaker !== '—';
      const t = !isSpeaker ? (b.type === 'narration' ? 'narration' : detectType(b.speaker))
        : b.speaker.includes('心の声') ? 'thought' : 'dialogue';
      const text = Array.isArray(b.text) ? b.text.join('\n') : (b.text||'');
      result.push({ type:t, imageId:img, chapterId:cid, speaker:b.speaker||'', text, title });
    });

    if (sc.choices || sc.choice) {
      const choiceData = sc.choices || sc.choice?.options;
      const prompt = sc.choice?.question || sc.choice?.prompt || '';
      const opts = (choiceData || []).map(o => ({
        label: o.label,
        score: o.score || {},
        inlineNextId: o.next,
        afterLines: o.after_lines || []
      }));
      result.push({ type:'choice', imageId:img, chapterId:cid, speaker:'', text:prompt, title, choices:opts,
        ch4SceneMap: sceneMap, ch5SceneMap: sceneMap });
      break;
    }

    curId = sc.next || null;
  }
  return result;
}

function handleTap() {
  if (waitingChoice || waitingName || waitingJoin) return;
  stepIdx++;

  showStep();
}

function showNameInput() {
  waitingName = true;
  document.getElementById('name-input-overlay').classList.add('show');
  document.getElementById('name-input').focus();
}

function submitName() {
  const val = document.getElementById('name-input').value.trim();
  playerName = val || 'ゆわ';
  document.getElementById('name-input-overlay').classList.remove('show');
  waitingName = false;
  stepIdx++;
  saveProgress();
  showStep();
}

});

// IMAGE
// ═══════════════════════════════════════════
function setImage(imgId, title) {
  $stitle.textContent = title || '';
  $phTxt.textContent = title || '';
  if (!imgId) { $imgWrap.classList.add('no-img'); return; }
  $imgWrap.classList.add('no-img'); // show placeholder until loaded
  $img.src = imgId;
}
function imgErr() { $imgWrap.classList.add('no-img'); }
function imgOk()  { $imgWrap.classList.remove('no-img'); }

// ═══════════════════════════════════════════
// BADGES / DOTS
// ═══════════════════════════════════════════
function updateBadge(cid) {
  $badge.textContent = CHAPTER_LABELS[cid] || '';
}

function updateScoreDots() {
  ['light','moon','fire','deep'].forEach(t => {
    document.getElementById(`d-${t}`).classList.toggle('on', scores[t] > 0);
  });
}

// ═══════════════════════════════════════════
// RESULT SCREEN
// ═══════════════════════════════════════════
function getWinner() {
  let max = -1, winner = lastScore || 'light';
  for (const [t,v] of Object.entries(scores)) {
    if (v > max) { max = v; winner = t; }
    else if (v === max && lastScore === t) winner = t;
  }
  return winner;
}

function showResultScreen() {
  fadeTransition(() => {
    document.getElementById('game-screen').classList.remove('active');
    const $rs = document.getElementById('result-screen');
    $rs.classList.add('active');
    playBGM('ending'); // 結果画面もendingBGM継続

    const winner = getWinner();
    const typeInfo = SCORE_TYPES[winner];
    const endData = ENDING_DATA.resultScreen;

    // Find matching type result
    const typeResult = endData.types.find(t => ENDING_SCORE_MAP[t.typeId] === winner);

    document.getElementById('rs-icon').textContent = typeInfo.icon;
    document.getElementById('rs-typename').textContent = typeResult ? typeResult.title : typeInfo.name;
    document.getElementById('rs-text').textContent = typeResult ? N(typeResult.text.join('\n')) : '';

    // scores
    const $sc = document.getElementById('rs-scores');
    $sc.innerHTML = '';
    for (const [t,v] of Object.entries(scores)) {
      const p = document.createElement('div');
      p.className = 'rs-pill' + (t === winner ? ' win' : '');
      p.textContent = `${SCORE_TYPES[t].icon} ${v}pt`;
      $sc.appendChild(p);
    }

    // common result
    const cr = endData.commonResult;
    document.getElementById('rs-ctitle').textContent = cr.resultName || cr.title;
    document.getElementById('rs-ctext').textContent = N(cr.text.join('\n'));
  });
}

function fadeTransition(cb) {
  $ov.classList.add('on');
  setTimeout(() => { cb(); setTimeout(() => $ov.classList.remove('on'), 80); }, 420);
}
